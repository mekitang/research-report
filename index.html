// ─── 마크다운 정리 ─────────────────────────────────────────────────────
function cleanMarkdown(text){
  if(!text) return text;
  var lines = String(text).split("\n");
  var out = [];
  for(var i=0; i<lines.length; i++){
    var line = lines[i];
    while(line.indexOf("**") >= 0){
      var a = line.indexOf("**");
      var b = line.indexOf("**", a+2);
      if(b >= 0){ line = line.slice(0,a) + line.slice(a+2,b) + line.slice(b+2); }
      else { line = line.slice(0,a) + line.slice(a+2); }
    }
    var s = line.replace(/ /g,"").replace(/\t/g,"");
    if(s.length>0 && s.split("").every(function(c){return c==="|"||c==="-"||c===":";})){
      continue;
    }
    if(line.trim().charAt(0)==="|"&&line.trim().slice(-1)==="|"){
      var cells=line.trim().slice(1,-1).split("|").map(function(c){return c.trim();}).filter(function(c){return c.length>0;});
      out.push(cells.join(", "));
      continue;
    }
    out.push(line);
  }
  var result=out.join("\n");
  while(result.indexOf("\n\n\n")>=0){result=result.split("\n\n\n").join("\n\n");}
  return result.trim();
}

// 503/429 과부하 시 자동 재시도 (최대 3회, 지수 백오프)
async function withRetry(fn, maxRetries=5, label="API") {
  for(let attempt=0; attempt<=maxRetries; attempt++){
    try{
      return await fn();
    }catch(e){
      const msg = e.message||"";
      const isOverload = msg.includes("high demand") ||
                         msg.includes("overloaded") ||
                         msg.includes("503") ||
                         msg.includes("UNAVAILABLE") ||
                         msg.includes("429") ||
                         msg.includes("quota") ||
                         msg.includes("rate limit") ||
                         msg.includes("RESOURCE_EXHAUSTED");
      if(isOverload && attempt < maxRetries){
        // 지수 백오프: 3초, 6초, 12초, 24초, 48초
        const wait = Math.min(3000 * Math.pow(2, attempt), 60000);
        console.warn(`[${label}] 과부하 → ${Math.round(wait/1000)}초 후 재시도 (${attempt+1}/${maxRetries})`);
        await new Promise(r=>setTimeout(r, wait));
        continue;
      }
      throw e;
    }
  }
}

async function geminiJSON(prompt) {
  const raw=await geminiRaw(prompt+"\n\n[중요] 반드시 순수 JSON만 출력하세요. 설명, ```json 코드블록, 마크다운 없이 JSON 객체만 반환.");
  console.log("geminiJSON raw:", raw.slice(0,300));
  // 1. 코드블록 제거
  let cleaned=raw.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  // 2. JSON 객체 추출
  const s=cleaned.indexOf("{"); const e=cleaned.lastIndexOf("}");
  if(s<0||e<0){
    console.warn("JSON 없음, raw:", cleaned.slice(0,200));
    return null;
  }
  const jsonStr=cleaned.slice(s,e+1);
  // 3. 파싱 시도
  try{ return JSON.parse(jsonStr); }
  catch(err){
    // 4. 제어문자 제거 후 재시도
    try{
      const fixed=jsonStr.replace(/[\x00-\x1F\x7F]/g," ").replace(/,\s*}/g,"}").replace(/,\s*]/g,"]");
      return JSON.parse(fixed);
    }catch(err2){
      console.warn("JSON 파싱 실패:", err2.message, "\n원본:", jsonStr.slice(0,300));
      return null;
    }
  }
}

        if(url.includes("vertexaisearch.cloud.google.com")){
          // uri 파라미터나 title에서 실제 도메인 추출 시도
          url=""; // 리다이렉트 URL 버림
        }
        return {url, title:c.web.title||""};
      }).filter(s=>s.url); // 빈 URL 제거
      
      // 텍스트에서 URL 직접 추출 (백업)
      const urlRegex=/https?:\/\/(?!vertexaisearch)[^\s\)"'<>]+/g;
      const textUrls=(text.match(urlRegex)||[])
        .filter(u=>!u.includes("vertexaisearch"))
        .map(u=>u.replace(/[.,;:!?]+$/,"")) // 후행 구두점 제거
        .slice(0,5);
      
      // sources가 없으면 텍스트에서 추출한 URL 사용
      const finalSources=sources.length>0 ? sources :
        textUrls.map(u=>({url:u,title:u.split("/").filter(Boolean).pop()||u}));
      
      return {text, sources:finalSources};
    }, 3, "geminiSearch");
  };

  // AI 소주제 추천
  const aiSuggest=async()=>{
    setLoading(true); setErr(""); setSuggestions([]); setShowSuggest(false);
    try{
      const kw=data.keywords.join(", ");
      const topic=data.selectedTopic||"";
      const result=await geminiJSON(
        "고등학생 탐구보고서 본론 소주제를 6개 추천해주세요.\n"+
        "탐구주제: "+topic+"\n학년: "+data.grade+"\n분야: "+data.field+"\n세부관심: "+data.interest+"\n키워드: "+kw+"\n"+
        "조건: 각 소주제는 본론 한 챕터로 작성 가능한 수준, 구체적이고 논리적 흐름이 있어야 함, 이유 2문장 포함\n"+
        "JSON:{\"subtopics\":[{\"text\":\"소주제\",\"reason\":\"이유\"},{\"text\":\"소주제\",\"reason\":\"이유\"}]}"
      );
      if(result?.subtopics){
        setSuggestions(result.subtopics.slice(0,6));
        setShowSuggest(true);
        set(p=>({...p,suggestedSubTopics:result.subtopics.slice(0,6)}));
      } else setErr("소주제 추천 실패. 다시 시도해주세요.");
    }catch(e){setErr("오류: "+e.message);}
    setLoading(false);
  };

  // 선택된 소주제 순서 추천
  const aiSortOrder=async()=>{
    const filled=(data.questions||[]).filter(q=>q.text.trim());
    if(filled.length<2){alert("소주제가 2개 이상이어야 순서를 추천받을 수 있습니다.");return;}
    setLoading(true);
    try{
      const topicList=filled.map((q,i)=>(i+1)+". "+q.text).join("\n");
      const topic=data.selectedTopic||data.field||"";
      const result=await geminiJSON(
        "다음 탐구보고서 소주제들의 논리적 순서를 추천해주세요.\n"+
        "탐구주제: "+topic+"\n"+
        "현재 소주제 목록:\n"+topicList+"\n\n"+
        "조건: 인과관계·개념 흐름·난이도 순으로 배열, 각 이유 1문장\n"+
        "JSON:{\"order\":[0,1,2],\"reasons\":[\"이유1\",\"이유2\",\"이유3\"],\"overall\":\"전체 순서 설명\"}"
      );
      if(result?.order){
        const newQ=[...data.questions];
        const sorted=result.order.map(idx=>filled[idx]||filled[0]);
        // 빈 소주제 유지, 선택된 것만 재정렬
        let si=0;
        for(let i=0;i<newQ.length;i++){
          if(newQ[i].text.trim()&&si<sorted.length){newQ[i]={...sorted[si]};si++;}
        }
        set(p=>({...p,questions:newQ}));
        const msg="📊 추천 순서:\n"+sorted.map((q,i)=>(i+1)+". "+q.text+"\n   → "+(result.reasons?.[i]||"")).join("\n")+(result.overall?"\n\n"+result.overall:"");
        alert(msg);
      }
    }catch(e){alert("오류: "+e.message);}
    setLoading(false);
  };


  // 소주제 채운 개수
  const filledCount=(data.questions||[]).slice(0,count).filter(q=>q.text.trim()).length;

  // AI 추천 소주제 선택
  const selectSuggestion=(s)=>{
    const q=[...(data.questions||[])];
    const empty=q.findIndex((x,i)=>i<count&&!x.text.trim());
    if(empty>=0){ q[empty]={...q[empty],text:s.text,reason:s.reason}; }
    else { q[count-1]={...q[count-1],text:s.text,reason:s.reason}; }
    set(p=>({...p,questions:q}));
  };

  // 개별 소주제 참고자료 검색 (실제 URL 반환)
  const searchRefsForQ=async(i)=>{
    const q=[...(data.questions||[])];
    if(!q[i]?.text.trim()) return;
    const newQ1=[...(data.questions||[])];
    newQ1[i]={...newQ1[i],linksLoading:true};
    set(p=>({...p,questions:newQ1}));
    try{
      const topic=data.selectedTopic||data.field||"";
      // geminiJSON으로 실제 URL 직접 반환받기
      const r=await geminiJSON(
        `고등학생 탐구보고서 참고자료를 찾아주세요.
탐구주제: ${topic}
소주제: ${q[i].text}

` +
        `조건:
- 실제로 접근 가능한 URL만 포함
- 한국어 자료 우선 (논문, 뉴스, 공공기관, 위키피디아 등)
` +
        `- vertexaisearch나 리다이렉트 URL 절대 사용 금지
- 실제 도메인 URL만 사용 (예: https://ko.wikipedia.org/...)

` +
        `JSON형식: {"sources":[{"url":"실제URL","title":"자료제목"},{"url":"실제URL","title":"자료제목"},{"url":"실제URL","title":"자료제목"}]}`
      );
      const sources=(r?.sources||[])
        .filter(s=>s.url&&s.url.startsWith("http")&&!s.url.includes("vertexaisearch"))
        .slice(0,5);
      const newQ2=[...(data.questions||[])];
      if(sources.length>0){
        newQ2[i]={...newQ2[i],links:sources,link:sources[0]?.url||"",linksLoading:false};
      } else {
        newQ2[i]={...newQ2[i],linksLoading:false};
      }
      set(p=>({...p,questions:newQ2}));
    }catch(e){
      const newQ3=[...(data.questions||[])];
      newQ3[i]={...newQ3[i],linksLoading:false};
      set(p=>({...p,questions:newQ3}));
      alert("자료 검색 실패: "+e.message);
    }
  };

  // 전체 소주제 참고자료 일괄 검색
  const searchAllRefs=async()=>{
    setRefLoading(true);
    const filled=(data.questions||[]).slice(0,count).filter(q=>q.text.trim());
    for(let i=0;i<filled.length;i++){
      const idx=(data.questions||[]).findIndex(q=>q.text===filled[i].text);
      if(idx>=0) await searchRefsForQ(idx);
      await new Promise(r=>setTimeout(r,2000));
    }
    setRefLoading(false);
  };

  return <div className="fade">
    <PH page={4} title="본론 소주제 정하기" sub="탐구보고서 본론에서 다룰 소주제를 정하세요."/>

    {/* 소주제 개수 선택 */}
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:"16px 20px",marginBottom:16}}>
      <div className="sec-label" style={{marginBottom:10}}>소주제 개수 선택</div>
      <div style={{display:"flex",gap:8}}>
        {[3,4,5].map(n=>(
          <button key={n} onClick={()=>changeCount(n)}
            className={"btn "+(count===n?"btn-primary":"btn-ghost")}
            style={{flex:1,fontSize:14,fontWeight:600}}>
            {n}개
          </button>
        ))}
      </div>
      <div style={{fontSize:11,color:"var(--text3)",marginTop:8,textAlign:"center"}}>
        현재 <strong style={{color:"var(--accent)"}}>{filledCount}/{count}</strong>개 소주제 작성됨
      </div>
    </div>

    {/* AI 소주제 추천 */}
    <div className="btn-row" style={{marginBottom:16}}>
      <button className="btn btn-primary" onClick={aiSuggest} disabled={loading}>
        {loading?"추천 중...":"🤖 AI로 소주제 추천받기"}
      </button>
      {filledCount>0&&<button className="btn btn-secondary" onClick={searchAllRefs} disabled={refLoading}>
        {refLoading?"자료 검색 중...":"🔍 전체 참고자료 검색"}
      </button>}
    </div>
    {loading&&<AILoad msg="소주제를 분석하고 추천 중..."/>}
    {refLoading&&<AILoad msg="각 소주제별 참고자료를 검색 중... (약 30~40초 소요)"/>}
    {err&&<div style={{color:"var(--danger)",fontSize:13,marginBottom:10}}>{err}</div>}

    {/* AI 추천 목록 */}
    {showSuggest&&suggestions.length>0&&(
      <div style={{background:"var(--surface2)",border:"1px solid var(--accent-dim)",borderRadius:"var(--r2)",padding:"16px",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,color:"var(--accent)",fontWeight:600}}>💡 AI 추천 소주제 — 클릭하여 선택</div>
          <button className="btn btn-ghost" style={{fontSize:10,padding:"3px 10px"}}
            onClick={()=>aiSortOrder()}
            disabled={filledCount<2}>
            📊 선택된 소주제 순서 추천
          </button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {suggestions.map((s,i)=>{
            const already=(data.questions||[]).some(q=>q.text===s.text);
            return <div key={i} onClick={()=>!already&&selectSuggestion(s)}
              style={{background:already?"var(--surface3)":"var(--surface)",
                border:"1px solid "+(already?"var(--border)":"var(--border2)"),
                borderRadius:"var(--r)",padding:"10px 14px",
                cursor:already?"default":"pointer",opacity:already?0.5:1,
                transition:"all .15s"}}
              onMouseEnter={e=>{ if(!already) e.currentTarget.style.borderColor="var(--accent)"; }}
              onMouseLeave={e=>{ if(!already) e.currentTarget.style.borderColor="var(--border2)"; }}>
              <div style={{fontSize:13,fontWeight:600,color:already?"var(--text3)":"var(--text)",marginBottom:3}}>
                {already?"✅ ":""}{s.text}
              </div>
              <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>{s.reason}</div>
            </div>;
          })}
        </div>
      </div>
    )}

    {/* 소주제 카드 */}
    {(data.questions||[]).slice(0,count).map((q,i)=>(
      <div key={i} className="qcard fade">
        <div className="qnum">소주제 {String(i+1).padStart(2,"0")}</div>
        <div className="fg"><label>소주제</label>
          <textarea rows={2} placeholder={"예: 인공지능의 의료 진단 활용 현황과 정확도 분석"} value={q.text} onChange={e=>updQ(i,"text",e.target.value)}/>
        </div>
        <div className="fg"><label>이 소주제를 선택한 이유</label>
          <textarea rows={2} placeholder="이 소주제를 탐구하려는 이유나 배경을 서술하세요." value={q.reason} onChange={e=>updQ(i,"reason",e.target.value)}/>
        </div>
        <div className="fg">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <label>참고 자료 링크 (최대 5개)</label>
            <div style={{display:"flex",gap:5}}>
              <button className="btn btn-ghost" style={{fontSize:10,padding:"3px 8px",color:"var(--accent)",borderColor:"var(--accent)"}}
                onClick={()=>searchRefsForQ(i)} disabled={!q.text.trim()||q.linksLoading}>
                {q.linksLoading?"검색 중...":"🔍 AI 자료검색"}
              </button>
              <button className="btn btn-ghost" style={{fontSize:10,padding:"3px 8px"}} onClick={()=>addLink(i)}>+ 직접 추가</button>
            </div>
          </div>
          {(q.links&&q.links.length>0) ? (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {q.links.map((lk,li)=>(
                <div key={li} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"10px 12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <span style={{fontSize:10,color:"var(--accent)",fontFamily:"var(--mono)",marginRight:6}}>자료 {li+1}</span>
                    <input type="text" style={{fontSize:11,flex:1,marginRight:8,padding:"2px 6px",color:"var(--accent)",background:"transparent",border:"none",borderBottom:"1px dashed var(--border2)"}}
                      value={lk.title||""} onChange={e=>updLink(i,li,"title",e.target.value)} placeholder="자료 설명 입력"/>
                    <button className="btn btn-danger" style={{fontSize:10,padding:"2px 7px",flexShrink:0}} onClick={()=>rmLink(i,li)}>제거</button>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input type="text" style={{fontSize:12,flex:1}} placeholder="https://..." value={lk.url||""} onChange={e=>updLink(i,li,"url",e.target.value)}/>
                    {lk.url&&<a href={lk.url} target="_blank" rel="noopener noreferrer"
                      style={{flexShrink:0,fontSize:11,color:"var(--accent)",textDecoration:"none",padding:"5px 10px",border:"1px solid var(--accent)",borderRadius:"4px",whiteSpace:"nowrap"}}>
                      🔗 열기
                    </a>}
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <input type="text" placeholder="https://... (직접 입력하거나 AI 자료검색 버튼 사용)" value={q.link||""} onChange={e=>updQ(i,"link",e.target.value)}/>
          )}
        </div>
      </div>
    ))}

    <NavRow page={3} onPrev={onPrev} onNext={onNext} nextDisabled={filledCount<count}/>
  </div>;
}


// ─── Page 4 ───────────────────────────────────────────────────────────────
function Page4({data,set,onPrev,onNext}){
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [editIdx,setEditIdx]=useState(null);
  const [directInput,setDirectInput]=useState(data.selectedTopic&&!data.suggestedTopics?.find(t=>t.title===data.selectedTopic)?data.selectedTopic:"");

  const LEVELS=[
    {key:"easy",label:"기초",desc:"개념 정의·비교 중심, 자료 조사형",color:"#22c55e"},
    {key:"mid",label:"심화",desc:"원인 분석·상관관계 탐구",color:"#f59e0b"},
    {key:"hard",label:"고급",desc:"실험·설계·비판적 분석 포함",color:"#ef4444"},
  ];

  const gen=async()=>{
    setLoading(true); setErr("");
    const lvl=data.topicLevel||"mid";
    const lvlDesc={easy:"개념 정의, 현황 조사, 사례 비교 수준의 기초적 탐구주제",mid:"원인 분석, 영향 관계, 상관관계를 다루는 심화 탐구주제",hard:"실험 설계, 모델 구축, 비판적 분석이 필요한 고급 탐구주제"};
    try{
      const r=await geminiJSON(`고등학생 탐구보고서 주제 5개 추천.
학년:${data.grade} / 분야:${data.field} / 세부관심:${data.interest}
키워드:${data.keywords.join(",")} / 질문:${data.questions.map((q,i)=>i+1+"."+q.text).join("|")}
난이도: ${lvlDesc[lvl]}
조건: 고등학교 수준, 학생부 기록 적합, 탐구 가능
JSON:{"topics":[{"title":"주제","reason":"추천 이유 2-3문장"}]}`);
      if(r?.topics) set(p=>({...p,suggestedTopics:r.topics,selectedTopic:""}));
      else setErr("생성 실패 (응답 파싱 오류). 다시 시도해주세요.");
    }catch(e){
      console.error("주제 생성 오류:", e);
      setErr("오류: "+e.message);
    }
    setLoading(false);
  };

  const selectTopic=(title)=>{ set(p=>({...p,selectedTopic:title})); setDirectInput(""); };
  const applyDirect=(v)=>{ setDirectInput(v); set(p=>({...p,selectedTopic:v})); };
  const applyEdit=(i,v)=>{
    const topics=[...(data.suggestedTopics||[])];
    topics[i]={...topics[i],title:v};
    set(p=>({...p,suggestedTopics:topics,selectedTopic:v}));
    setEditIdx(null);
  };

  return <div className="fade">
    <PH page={3} title="AI 탐구주제 추천" sub="난이도를 설정하고 AI가 추천하는 탐구주제를 선택하세요."/>

    <div className="sec-label">탐구 난이도 설정</div>
    <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
      {LEVELS.map(lv=>(
        <div key={lv.key}
          onClick={()=>set(p=>({...p,topicLevel:lv.key}))}
          style={{flex:1,minWidth:120,background:"var(--surface)",border:`2px solid ${data.topicLevel===lv.key?lv.color:"var(--border)"}`,borderRadius:"var(--r2)",padding:"14px 16px",cursor:"pointer",transition:"all .18s",boxShadow:data.topicLevel===lv.key?`0 0 12px ${lv.color}44`:"none"}}>
          <div style={{fontSize:14,fontWeight:600,color:data.topicLevel===lv.key?lv.color:"var(--text)",marginBottom:4}}>{lv.label}</div>
          <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>{lv.desc}</div>
        </div>
      ))}
    </div>

    <div className="btn-row">
      <button className="btn btn-primary" onClick={gen} disabled={loading}>
        {loading?"생성 중...":data.suggestedTopics?.length?"🔄 다시 추천":"✨ AI 주제 추천"}
      </button>
    </div>
    {loading&&<AILoad msg="최적의 탐구주제를 분석 중..."/>}
    {err&&<div style={{color:"var(--danger)",fontSize:13,marginBottom:10}}>{err}</div>}

    {data.suggestedTopics?.map((t,i)=>(
      <div key={i} className={`topic-card ${data.selectedTopic===t.title?"sel":""}`}
        onClick={()=>editIdx===i?null:selectTopic(t.title)}>
        {data.selectedTopic===t.title&&editIdx!==i&&<div className="topic-check">✓</div>}
        {editIdx===i ? (
          <div onClick={e=>e.stopPropagation()}>
            <input type="text" defaultValue={t.title} id={`edit-topic-${i}`}
              style={{width:"100%",marginBottom:8,fontWeight:600,fontSize:14}}
              onKeyDown={e=>e.key==="Enter"&&applyEdit(i,e.target.value)}/>
            <div style={{display:"flex",gap:7}}>
              <button className="btn btn-primary" style={{fontSize:11,padding:"4px 10px"}}
                onClick={()=>applyEdit(i,document.getElementById(`edit-topic-${i}`).value)}>확인</button>
              <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}}
                onClick={()=>setEditIdx(null)}>취소</button>
            </div>
          </div>
        ) : (
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div className="topic-title" style={{flex:1}}>{t.title}</div>
              <button className="btn btn-ghost" style={{fontSize:10,padding:"2px 8px",flexShrink:0}}
                onClick={e=>{e.stopPropagation();setEditIdx(i);}}>✏️ 수정</button>
            </div>
            <div className="topic-reason">{t.reason}</div>
          </>
        )}
      </div>
    ))}

    <div className="divider"/>
    <div className="fg">
      <label>직접 주제 작성</label>
      <input type="text" placeholder="원하는 탐구주제를 직접 입력하세요"
        value={directInput} onChange={e=>applyDirect(e.target.value)}/>
      {directInput&&<div style={{fontSize:11,color:"var(--success)",marginTop:4}}>✓ 직접 입력한 주제가 선택되었습니다.</div>}
    </div>

    {data.selectedTopic&&(
      <div className="info-box">✅ 선택된 주제: <strong>{data.selectedTopic}</strong>
        {data.topicLevel&&<span style={{marginLeft:8,fontSize:11,color:"var(--text3)"}}>
          [{LEVELS.find(l=>l.key===data.topicLevel)?.label||""}]
        </span>}
      </div>
    )}
    <NavRow page={2} onPrev={onPrev} onNext={onNext} nextDisabled={!data.selectedTopic}/>
  </div>;
}

// ─── Page 5 ───────────────────────────────────────────────────────────────
function Page5({data,set,onPrev,onNext}){
  const [loading,setLoading]=useState(false);
  const toc=data.toc;
  const updT=(sec,k,v)=>set(p=>({...p,toc:{...p.toc,[sec]:{...p.toc[sec],[k]:v}}}));
  const updB=(i,v)=>{ const items=[...toc.body.items]; items[i]=v; set(p=>({...p,toc:{...p.toc,body:{items}}})); };

  const aiRefineBody=async()=>{
    setLoading(true);
    try{
      const r=await geminiJSON(`
탐구보고서 본론 목차 항목을 정교하게 다듬어 주세요.
- 탐구 주제: ${data.selectedTopic}
- 관심 분야: ${data.field}
- 현재 질문들: ${data.questions.map((q,i)=>`${i+1}. ${q.text}`).join(" | ")}

각 질문을 바탕으로 본론 소제목을 더 학술적이고 구체적으로 작성해주세요.
JSON: {"items":["소제목1","소제목2","소제목3"]}`);
      if(r?.items) set(p=>({...p,toc:{...p.toc,body:{items:r.items}}}));
    }catch(e){}
    setLoading(false);
  };

  return <div className="fade">
    <PH page={5} title="목차 구성" sub="탐구보고서 목차를 확인하고 수정하세요. 본론은 AI로 개선할 수 있습니다."/>
    <div className="info-box">📋 선택된 주제: <strong>{data.selectedTopic}</strong></div>

    <div className="toc-sec">
      <div className="toc-hd"><span>Ⅰ. 서론</span><span className="toc-badge">INTRO</span></div>
      <div className="toc-items toc-edit">
        {[["motivation","1.1 탐구의 동기"],["purpose","1.2 탐구의 목적"],["necessity","1.3 탐구의 필요성"]].map(([k,lbl])=>(
          <div key={k} className="toc-item"><div className="toc-dot"/>
            <input value={toc.intro[k]} onChange={e=>updT("intro",k,e.target.value)} placeholder={lbl}/>
          </div>
        ))}
      </div>
    </div>

    <div className="toc-sec">
      <div className="toc-hd">
        <span>Ⅱ. 본론</span>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span className="toc-badge">BODY</span>
          <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 9px"}} onClick={aiRefineBody} disabled={loading}>
            {loading?"처리 중...":"🤖 AI 개선"}
          </button>
        </div>
      </div>
      {loading&&<div style={{padding:"10px 16px"}}><AILoad msg="본론 목차를 개선 중..."/></div>}
      <div className="toc-items toc-edit">
        {toc.body.items.map((item,i)=>(
          <div key={i} className="toc-item"><div className="toc-dot"/>
            <input value={item} onChange={e=>updB(i,e.target.value)} placeholder={`${i+1}번째 본론 항목`}/>
          </div>
        ))}
      </div>
    </div>

    <div className="toc-sec">
      <div className="toc-hd"><span>Ⅲ. 결론</span><span className="toc-badge">CONCLUSION</span></div>
      <div className="toc-items toc-edit">
        {[["summary","3.1 탐구 요약"],["learned","3.2 알게 된 점"],["skills","3.3 향상된 역량"],["future","3.4 추가 탐구 목표"],["refs","3.5 참고문헌"]].map(([k,lbl])=>(
          <div key={k} className="toc-item"><div className="toc-dot"/>
            <input value={toc.conclusion[k]} onChange={e=>updT("conclusion",k,e.target.value)} placeholder={lbl}/>
          </div>
        ))}
      </div>
    </div>
    <NavRow page={4} onPrev={onPrev} onNext={onNext}/>
  </div>;
}

// ─── Page 7 ───────────────────────────────────────────────────────────────
function Page7({data,set,onPrev,onNext}){
  const [loading,setLoading]=useState(false);
  const [which,setWhich]=useState(null); // 'all'|'motivation'|'purpose'|'necessity'

  const gen=async(target)=>{
    setLoading(true); setWhich(target);
    try{
      const base=`주제:${data.selectedTopic} / 분야:${data.field} / 학년:${data.grade} / 질문들:${data.questions.map(q=>q.text).join(", ")} / 분량:${data.pageCount}페이지`;
      if(target==="all"){
        const r=await geminiJSON(`
고등학생 탐구보고서 서론 작성. ${base}
- 탐구의 동기: 300~500자 (이 주제를 탐구하게 된 개인적 계기, 관련 경험, 사회적 배경 포함)
- 탐구의 목적: 300~500자 (이 탐구를 통해 달성하려는 구체적 목적과 기대 효과)
- 탐구의 필요성: 300~500자 (이 탐구가 학문적·사회적으로 필요한 이유)
JSON: {"motivation":"내용","purpose":"내용","necessity":"내용"}`);
        if(r) set(p=>({...p,intro:{...p.intro,...r}}));
      } else {
        const specs={motivation:"탐구의 동기 (300~500자): 이 주제를 탐구하게 된 개인적 계기, 관련 경험, 사회적 배경 포함",purpose:"탐구의 목적 (300~500자): 이 탐구를 통해 달성하려는 구체적 목적과 기대 효과",necessity:"탐구의 필요성 (300~500자): 이 탐구가 학문적·사회적으로 필요한 이유"};
        const r=await geminiJSON(`고등학생 탐구보고서 서론 중 하나만 작성. ${base}\n작성항목: ${specs[target]}\nJSON: {"content":"내용"}`);
        if(r?.content) set(p=>({...p,intro:{...p.intro,[target]:r.content}}));
      }
    }catch(e){}
    setLoading(false); setWhich(null);
  };

  const sections=[
    {key:"motivation",label:"탐구의 동기",min:300,max:500,ph:"이 주제를 탐구하게 된 동기를 서술하세요. (300~500자 권장)"},
    {key:"purpose",label:"탐구의 목적",min:300,max:500,ph:"이 탐구를 통해 달성하려는 목적을 서술하세요. (300~500자 권장)"},
    {key:"necessity",label:"탐구의 필요성",min:300,max:500,ph:"이 탐구가 왜 필요한지 서술하세요. (300~500자 권장)"},
  ];

  return <div className="fade">
    <PH page={7} title="서론 작성" sub="탐구의 동기·목적·필요성을 작성하세요. (각 300~500자 권장)"/>
    <div className="info-box">주제: <strong>{data.selectedTopic}</strong></div>
    <div className="btn-row">
      <button className="btn btn-primary" onClick={()=>gen("all")} disabled={loading}>🤖 서론 전체 AI 작성</button>
      <button className="btn btn-warn" onClick={()=>gen("all")} disabled={loading}>🔄 전체 다시 작성</button>
    </div>
    {loading&&which==="all"&&<AILoad msg="서론 전체를 작성 중..."/>}
    {sections.map(s=>(
      <div key={s.key} className="fg">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <label>{s.label}</label>
          <div style={{display:"flex",gap:6}}>
            <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>gen(s.key)} disabled={loading}>🤖 AI 작성</button>
            <button className="btn btn-warn" style={{fontSize:11}} onClick={()=>gen(s.key)} disabled={loading}>🔄 다시</button>
          </div>
        </div>
        {loading&&which===s.key&&<AILoad msg={`${s.label} 작성 중...`}/>}
        <textarea rows={6} placeholder={s.ph} value={data.intro?.[s.key]||""} onChange={e=>set(p=>({...p,intro:{...p.intro,[s.key]:e.target.value}}))}/>
        <CharCount text={data.intro?.[s.key]||""} min={s.min} max={s.max}/>
      </div>
    ))}
    <NavRow page={6} onPrev={onPrev} onNext={onNext}/>
  </div>;
}

// ─── Page 8 ───────────────────────────────────────────────────────────────
// bodyImages: { q0: [{id, src, caption, position}], q1: [...], ... }
function Page8({data,set,onPrev,onNext}){
  const [loading,setLoading]=useState(false);
  const [loadingIdx,setLoadingIdx]=useState(null);
  const [imgModal,setImgModal]=useState(null); // {qIdx, insertAfter} or null
  const [imgUrlInput,setImgUrlInput]=useState("");
  const [imgCaption,setImgCaption]=useState("");
  const fileRef=useRef();

  // 전역 붙여넣기: 이미지 모달이 열린 상태에서 Ctrl+V/Cmd+V
  useEffect(()=>{
    const handleGlobalPaste=(e)=>{
      if(imgModal===null) return;
      if(!e.clipboardData) return;
      const items=Array.from(e.clipboardData.items);
      const imgItem=items.find(item=>item.type.startsWith("image/"));
      if(!imgItem) return;
      e.preventDefault();
      const file=imgItem.getAsFile();
      if(file) addImageFromFile(imgModal,file);
    };
    window.addEventListener("paste",handleGlobalPaste);
    return ()=>window.removeEventListener("paste",handleGlobalPaste);
  },[imgModal]);

  // ── helpers ──────────────────────────────────────────────────────────────
  const getImgs=(i)=>(data.bodyImages?.[`q${i}`]||[]);
  const setImgs=(i,imgs)=>set(p=>({...p,bodyImages:{...p.bodyImages,[`q${i}`]:imgs}}));

  const addImageFromFile=(qIdx,file)=>{
    if(!file||!file.type.startsWith("image/")) return;
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img={id:Date.now(),src:e.target.result,caption:imgCaption||"",srcType:"upload"};
      setImgs(qIdx,[...getImgs(qIdx),img]);
      setImgModal(null); setImgCaption(""); setImgUrlInput("");
    };
    reader.readAsDataURL(file);
  };

  // 클립보드 붙여넣기로 이미지 추가
  const addImageFromPaste=(qIdx,e)=>{
    if(!e.clipboardData) return;
    const items=Array.from(e.clipboardData.items);
    const imgItem=items.find(item=>item.type.startsWith("image/"));
    if(!imgItem) return;
    e.preventDefault();
    const file=imgItem.getAsFile();
    if(file) addImageFromFile(qIdx,file);
  };

  const addImageFromUrl=(qIdx)=>{
    if(!imgUrlInput.trim()) return;
    const img={id:Date.now(),src:imgUrlInput.trim(),caption:imgCaption||"",srcType:"url"};
    setImgs(qIdx,[...getImgs(qIdx),img]);
    setImgModal(null); setImgCaption(""); setImgUrlInput("");
  };

  const removeImg=(qIdx,id)=>setImgs(qIdx,getImgs(qIdx).filter(img=>img.id!==id));
  const updateCaption=(qIdx,id,cap)=>setImgs(qIdx,getImgs(qIdx).map(img=>img.id===id?{...img,caption:cap}:img));
  const moveImg=(qIdx,id,dir)=>{
    const imgs=[...getImgs(qIdx)];
    const idx=imgs.findIndex(img=>img.id===id);
    if(idx<0) return;
    const newIdx=idx+dir;
    if(newIdx<0||newIdx>=imgs.length) return;
    [imgs[idx],imgs[newIdx]]=[imgs[newIdx],imgs[idx]];
    setImgs(qIdx,imgs);
  };

  // ── AI gen ────────────────────────────────────────────────────────────────
  const genOne=async(i)=>{
    setLoadingIdx(i);
    try{
      const q=data.questions[i];
      const style=data.bodyStyle==="outline"?"소주제를 3~4개로 나누어 각 소주제별로 내용을 서술하는 형식":"단락 구분 없이 서술형으로 작성";
      const r=await geminiJSON(
`고등학생 탐구보고서 본론 작성.
주제: ${data.selectedTopic}
질문: ${q.text}
질문 이유: ${q.reason}
학년: ${data.grade} / 분량목표: ${data.pageCount}페이지
서술방식: ${style}
분량: 500~700자
요구사항: 정확한 사실과 근거, 논리적 흐름, 고등학생 수준 용어
${data.bodyStyle==="outline"?"- 각 소주제는 '■ 소주제명' 형식으로 시작":""}
JSON: {"content":"본론 내용"}`);
      if(r?.content) set(p=>({...p,body:{...p.body,[`q${i}`]:r.content}}));
    }catch(e){}
    setLoadingIdx(null);
  };

  const genAll=async()=>{
    setLoading(true);
    for(let i=0;i<data.questions.length;i++){ await genOne(i); }
    setLoading(false);
  };

  // ── Image modal ───────────────────────────────────────────────────────────
  const ImageModal=({qIdx})=>(
    <div className="modal-bg" onClick={()=>{setImgModal(null);setImgUrlInput("");setImgCaption("");}}
      onPaste={e=>addImageFromPaste(qIdx,e)}>
      <div className="modal" onClick={e=>e.stopPropagation()}
        onPaste={e=>addImageFromPaste(qIdx,e)}>
        <h3 style={{marginBottom:12}}>🖼 이미지 추가 — 본론 {qIdx+1}</h3>

        {/* 붙여넣기 안내 */}
        <div style={{background:"rgba(59,130,246,0.08)",border:"1px solid var(--accent)",borderRadius:"var(--r)",
          padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>📋</span>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:"var(--accent)"}}>Ctrl+V / Cmd+V 로 붙여넣기 지원</div>
            <div style={{fontSize:11,color:"var(--text3)"}}>스크린샷이나 복사한 이미지를 이 창이 열린 상태에서 바로 붙여넣을 수 있습니다.</div>
          </div>
        </div>

        {/* Upload + 붙여넣기 드롭존 */}
        <div style={{background:"var(--surface2)",border:"2px dashed var(--border2)",borderRadius:"var(--r2)",
          padding:"20px",textAlign:"center",marginBottom:14,cursor:"pointer"}}
          onClick={()=>fileRef.current&&(fileRef.current.qIdx=qIdx)&&fileRef.current.click()}
          onDragOver={e=>e.preventDefault()}
          onDrop={e=>{e.preventDefault();addImageFromFile(qIdx,e.dataTransfer.files[0]);}}
          onPaste={e=>addImageFromPaste(qIdx,e)}>
          <div style={{fontSize:26,marginBottom:6}}>📁</div>
          <div style={{fontSize:13,color:"var(--text2)"}}>클릭하거나 파일을 드래그하여 업로드</div>
          <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>JPG, PNG, GIF, WEBP · Ctrl+V 붙여넣기도 가능</div>
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}}
          onChange={e=>{if(e.target.files[0]) addImageFromFile(fileRef.current.qIdx,e.target.files[0]); e.target.value="";}}/>

        <div style={{display:"flex",alignItems:"center",gap:10,margin:"12px 0",color:"var(--text3)",fontSize:12}}>
          <div style={{flex:1,height:1,background:"var(--border)"}}/>또는<div style={{flex:1,height:1,background:"var(--border)"}}/>
        </div>

        {/* URL */}
        <div className="fg" style={{marginBottom:10}}>
          <label>이미지 URL</label>
          <input type="text" placeholder="https://example.com/image.png"
            value={imgUrlInput} onChange={e=>setImgUrlInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addImageFromUrl(qIdx)}/>
        </div>

        {/* Caption */}
        <div className="fg" style={{marginBottom:16}}>
          <label>이미지 설명 (캡션)</label>
          <input type="text" placeholder="예: [그림 1] AI 의료 진단 정확도 비교"
            value={imgCaption} onChange={e=>setImgCaption(e.target.value)}/>
        </div>

        <div style={{display:"flex",gap:8}}>
          {imgUrlInput.trim()&&
            <button className="btn btn-primary" style={{flex:1}} onClick={()=>addImageFromUrl(qIdx)}>URL로 추가</button>}
          <button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setImgModal(null);setImgUrlInput("");setImgCaption("");}}>취소</button>
        </div>
      </div>
    </div>
  );

  // ── Image card ────────────────────────────────────────────────────────────
  const ImageCard=({qIdx,img,idx,total})=>(
    <div style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:"var(--r2)",
      padding:"12px",marginBottom:10,position:"relative"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--accent)",letterSpacing:"1px"}}>
          IMAGE {String(idx+1).padStart(2,"0")}
        </span>
        <div style={{display:"flex",gap:5}}>
          {idx>0&&<button className="btn btn-ghost" style={{fontSize:11,padding:"2px 8px"}}
            onClick={()=>moveImg(qIdx,img.id,-1)}>↑</button>}
          {idx<total-1&&<button className="btn btn-ghost" style={{fontSize:11,padding:"2px 8px"}}
            onClick={()=>moveImg(qIdx,img.id,1)}>↓</button>}
          <button className="btn btn-danger" style={{fontSize:11,padding:"2px 8px"}}
            onClick={()=>removeImg(qIdx,img.id)}>삭제</button>
        </div>
      </div>
      <div style={{background:"var(--surface3)",borderRadius:"var(--r)",overflow:"hidden",
        marginBottom:8,textAlign:"center",minHeight:80,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <img src={img.src} alt={img.caption||"이미지"}
          style={{maxWidth:"100%",maxHeight:240,objectFit:"contain",borderRadius:"var(--r)"}}
          onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="flex";}}/>
        <div style={{display:"none",flexDirection:"column",alignItems:"center",
          color:"var(--text3)",fontSize:12,gap:6,padding:16}}>
          <span style={{fontSize:24}}>🖼</span>
          <span>이미지를 불러올 수 없습니다</span>
          <span style={{fontSize:11,wordBreak:"break-all",color:"var(--text3)"}}>{img.src.slice(0,60)}...</span>
        </div>
      </div>
      <input type="text" placeholder="이미지 설명 (캡션) 입력..."
        style={{fontSize:12,color:"var(--text3)",fontStyle:"italic"}}
        value={img.caption||""} onChange={e=>updateCaption(qIdx,img.id,e.target.value)}/>
    </div>
  );

  // ── render ────────────────────────────────────────────────────────────────
  return <div className="fade">
    <PH page={8} title="본론 작성" sub={`각 탐구 질문을 바탕으로 본론을 작성하고 이미지를 추가하세요.`}/>
    <div className="info-box">주제: <strong>{data.selectedTopic}</strong>
      <span style={{marginLeft:12,fontSize:11,color:"var(--text3)"}}>
        서술방식: {data.bodyStyle==="prose"?"서술형":"소주제 분류형"}
      </span>
    </div>
    <div className="btn-row">
      <button className="btn btn-primary" onClick={genAll} disabled={loading||loadingIdx!==null}>
        {loading?"생성 중...":"🤖 본론 전체 AI 작성"}
      </button>
      <button className="btn btn-warn" onClick={genAll} disabled={loading||loadingIdx!==null}>🔄 전체 다시 작성</button>
    </div>

function buildDocContent(data, includeEval=false, useCorrected=false){
  // Build RTF-based .doc that opens in Word / Hangul / LibreOffice
  const esc=(s)=>(s||"").replace(/\\/g,"\\\\").replace(/\n/g,"\\line\n").replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g,"");
  const h1=(t)=>`{\\pard\\sb400\\sa200\\qc\\b\\fs32 ${esc(t)}\\par}\n`;
  const h2=(t)=>`{\\pard\\sb360\\sa120\\b\\fs26\\brdrt\\brdrw10\\brdrs\\brdrbtrl\\brdrw10\\brdrs  ${esc(t)}\\par}\n`;
  const h3=(t)=>`{\\pard\\sb240\\sa80\\b\\fs24\\cf2 ${esc(t)}\\par}\n`;
  const para=(t)=>`{\\pard\\sa160\\fs22 ${esc(t)}\\par}\n`;
  const meta=(t)=>`{\\pard\\qc\\sa80\\fs20\\cf3 ${esc(t)}\\par}\n`;
  const divider=`{\\pard\\sb200\\sa200\\brdrb\\brdrw5\\brdrs \\par}\n`;
  const pageBreak=`{\\pard\\pagebb\\par}\n`;

  let body="";

  if(useCorrected && data.correctedText){
    // corrected version — parse sections from corrected text
    body+=h1(data.selectedTopic);
    body+=meta(data.school+" "+data.grade+" "+data.name+" — AI 교정본");
    body+=divider;
    const lines=data.correctedText.split("\n");
    for(const line of lines){
      if(line.match(/^\[.+\]$/)){
        body+=h3(line.replace(/^\[|\]$/g,""));
      } else if(line.trim()){
        body+=para(line);
      }
    }
  } else {
    // original report
    body+=h1(data.selectedTopic);
    body+=meta(data.school+" "+data.grade+" "+data.name);
    body+=divider;

    body+=h2("Ⅰ. 서론");
    body+=h3("1.1 탐구의 동기"); body+=para(data.intro?.motivation||"");
    body+=h3("1.2 탐구의 목적"); body+=para(data.intro?.purpose||"");
    body+=h3("1.3 탐구의 필요성"); body+=para(data.intro?.necessity||"");

    body+=h2("Ⅱ. 본론");
    (data.questions||[]).forEach((q,i)=>{
      body+=h3((i+1)+". "+q.text);
      body+=para(data.body?.["q"+i]||"");
    });

    body+=h2("Ⅲ. 결론");
    body+=h3("3.1 탐구 요약"); body+=para(data.conclusion?.summary||"");
    body+=h3("3.2 알게 된 점"); body+=para(data.conclusion?.learned||"");
    body+=h3("3.3 향상된 역량"); body+=para(data.conclusion?.skills||"");
    body+=h3("3.4 추가 탐구 목표"); body+=para(data.conclusion?.future||"");

    body+=h2("참고문헌");
    (data.conclusion?.refs||[]).forEach((r,i)=>{ body+=para("["+(i+1)+"] "+r); });
    const linkRefs=data.questions.filter(q=>q.link);
    const offset=(data.conclusion?.refs||[]).length;
    linkRefs.forEach((q,i)=>{ body+=para("["+(offset+i+1)+"] "+q.link); });
    if((data.conclusion?.books||[]).length){
      body+=h3("추천 도서");
      (data.conclusion?.books||[]).forEach(b=>{ body+=para("📚 "+b); });
    }
  }

  if(includeEval){
    body+=pageBreak;
    body+=h1("자기평가서");
    body+=meta(data.school+" "+data.grade+" "+data.name);
    body+=meta("탐구주제: "+data.selectedTopic);
    body+=divider;
    const ev=data.selfEval||{};
    const cr=data.correctedEval||{};
    // 자기평가서 전용: keepn으로 페이지 분리 방지, 간격 최소화
    const evalH=(t)=>`{\\pard\\keepn\\sb120\\sa60\\b\\fs22\\cf2 ${esc(t)}\\par}\n`;
    const evalP=(t)=>`{\\pard\\keep\\sa120\\fs22 ${esc(t)}\\par}\n`;
    const evalFields=[
      {key:"motivation",label:"동기"},
      {key:"process",label:"과정"},
      {key:"skills",label:"강화된 역량"},
      {key:"learned",label:"새롭게 알게 된 점"},
      {key:"future",label:"추후 탐구"},
    ];
    evalFields.forEach(f=>{
      const val=cr[f.key]||ev[f.key]||"";
      if(val){ body+=evalH(f.label); body+=evalP(val); }
    });
  }

  const rtf=`{\\rtf1\\ansi\\ansicpg949\\deff0
{\\fonttbl{\\f0\\froman\\fcharset129 \'b3\'cb\'c3\'fa;}
{\\f1\\fswiss\\fcharset129 \'b3\'cb\'c3\'fa;}}
{\\colortbl;\\red0\\green0\\blue0;\\red51\\green51\\blue153;\\red100\\green100\\blue100;}
\\widowctrl\\hyphauto\\ftnbj
${body}}`;
  return rtf;
}

// ─── PDF download helper (Blob, no print dialog) ─────────────────────────
function buildRefsHTML(data){
  // 3페이지 질문에서 수집된 실제 링크들 (links 배열 + link 단일)
  const allLinks=[];
  (data.questions||[]).forEach(q=>{
    if(q.links&&q.links.length>0){
      q.links.forEach(lk=>{ if(lk.url&&lk.url.trim()) allLinks.push({url:lk.url,title:lk.title||lk.url}); });
    } else if(q.link&&q.link.trim()){
      allLinks.push({url:q.link,title:q.link});
    }
  });
  // APA refs from conclusion
  const apaRefs=(data.conclusion?.refs||[]);
  let html="";
  apaRefs.forEach((r,i)=>{ html+=`<p style="margin:4px 0;font-size:13px;line-height:1.6">[${i+1}] ${r}</p>`; });
  // question links (deduplicated)
  const seen=new Set(apaRefs);
  let idx=apaRefs.length;
  allLinks.forEach(lk=>{
    if(!seen.has(lk.url)){ seen.add(lk.url); idx++;
      html+=`<p style="margin:4px 0;font-size:13px;line-height:1.6">[${idx}] <a href="${lk.url}" style="color:#1d4ed8">${lk.title!==lk.url?lk.title+" ("+lk.url+")":lk.url}</a></p>`;
    }
  });
  if((data.conclusion?.books||[]).length){
    html+=`<h3 style="font-size:14px;margin:16px 0 6px;color:#333">추천 도서</h3>`;
    (data.conclusion.books).forEach(b=>{ html+=`<p style="margin:4px 0;font-size:13px">📚 ${b}</p>`; });
  }

const PDF_BASE_STYLE=`@page{size:A4;margin:2.5cm}
body{font-family:'맑은 고딕','Noto Sans KR',Arial,sans-serif;font-size:14px;line-height:1.9;color:#111;background:#fff;padding:0;margin:0}
h1,h2,h3{font-family:'맑은 고딕','Noto Sans KR',Arial,sans-serif}
p{margin-bottom:10px}a{color:#1d4ed8}`;

function downloadPDFBlob(htmlBody, filename){
  const full=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${filename}</title>
<style>${PDF_BASE_STYLE}</style></head><body>${htmlBody}</body></html>`;
  const blob=new Blob([full],{type:"application/pdf;charset=utf-8"});
  // Use HTML mime with .html extension that auto-triggers save-as PDF in most browsers
  // Better: use text/html and force download then user opens & prints, OR use mhtml
  // Most reliable cross-browser: download as .html, user opens in browser > print to PDF
  // For true direct PDF: use print-to-pdf via hidden iframe
  const printBlob=new Blob([full],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(printBlob);
  const iframe=document.createElement("iframe");
  iframe.style.cssText="position:fixed;width:0;height:0;border:none;opacity:0;left:-9999px";
  document.body.appendChild(iframe);
  iframe.onload=()=>{
    setTimeout(()=>{
      try{ iframe.contentWindow.print(); }catch(e){}
      setTimeout(()=>{ document.body.removeChild(iframe); URL.revokeObjectURL(url); },2000);
    },400);
  };
  iframe.src=url;
}

function downloadHTMLasPDF(htmlBody, filename){
  // Cross-platform: create a standalone HTML file that auto-prints on open
  const full=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${filename}</title>
<style>
${PDF_BASE_STYLE}
@media screen{body{padding:2cm;max-width:21cm;margin:0 auto;box-shadow:0 0 10px rgba(0,0,0,.1)}}
</style>
</head><body>${htmlBody}
<script>
(function(){
  var done=false;
  function tryPrint(){if(done)return;done=true;window.print();}
  if(document.readyState==="complete"){setTimeout(tryPrint,300);}
  else{window.addEventListener("load",function(){setTimeout(tryPrint,300);});}
})();
<\/script>
</body></html>`;
  const blob=new Blob(["﻿"+full],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=filename.replace(/\.pdf$/,"")+".html"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}

// Primary PDF download: Blob download as .html (auto-print on open) 
// This is the most reliable cross-browser/mobile approach without a PDF library
function downloadPDF(data, filename, includeEval=false, useCorrected=false){
  const reportPart=buildReportHTML(data, useCorrected);
  const evalPart=includeEval?buildEvalHTML(data):"";
  downloadHTMLasPDF(reportPart+evalPart, filename);
}

function MyReportsModal({user,onClose,onLoad}){
  const [reports,setReports]=useState([]);
  const [loading,setLoading]=useState(true);

  const loadReports=async()=>{
    setLoading(true);
    try{
      await waitFb();
      const {collection,query,where,getDocs}=window._fbFns;
      const q=query(collection(window._fbDb,"reports"),where("userId","==",user.uid));
      const snap=await getDocs(q);
      const docs=snap.docs.map(d=>({id:d.id,...d.data()})).filter(d=>!d.deleted);
      docs.sort((a,b)=>{
        const ta=a.updatedAt?.toMillis?.()||new Date(a.updatedAt||0).getTime();
        const tb=b.updatedAt?.toMillis?.()||new Date(b.updatedAt||0).getTime();
        return tb-ta;
      });
      setReports(docs);
    }catch(e){console.error(e);}
    setLoading(false);
  };

  useEffect(()=>{ loadReports(); },[]);

  const deleteReport=async(r)=>{
    if(!window.confirm(`"${r.data?.selectedTopic||r.title||"이 보고서"}"를 삭제하시겠습니까?\n삭제된 보고서는 복구할 수 없습니다.`))return;
    try{
      await waitFb();
      const {doc,updateDoc,serverTimestamp}=window._fbFns;
      await updateDoc(doc(window._fbDb,"reports",r.id),{deleted:true,deletedAt:serverTimestamp()});
      setReports(prev=>prev.filter(x=>x.id!==r.id));
    }catch(e){alert("삭제 실패: "+e.message);}
  };

  return <div className="modal-bg" onClick={onClose}>
    <div className="modal" style={{maxWidth:640}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h3 style={{margin:0}}>📋 내 보고서 목록</h3>
        <span style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--mono)"}}>{reports.length}개</span>
      </div>
      {loading&&<AILoad msg="보고서 목록을 불러오는 중..."/>}
      {!loading&&reports.length===0&&(
        <div style={{color:"var(--text3)",fontSize:13,textAlign:"center",padding:"24px 0"}}>
          저장된 보고서가 없습니다.
        </div>
      )}
      {reports.map(r=>(
        <div key={r.id} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:"12px 14px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {r.data?.selectedTopic||r.title||"주제 없음"}
              </div>
              <div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>
                {r.data?.school||""} {r.data?.grade||""} {r.data?.name||""}
                <span style={{marginLeft:8,fontFamily:"var(--mono)"}}>{r.updatedAt?.toDate?.()?.toLocaleDateString("ko-KR")||""}</span>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
            <button className="btn btn-success" style={{fontSize:11,padding:"4px 10px"}}
              onClick={()=>{ if(r.data) dlPDF(r.data, makeFilename(r.data)+".html"); }}>
              📄 PDF 저장
            </button>
            <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}}
              onClick={()=>{ if(r.data) downloadDoc(r.data, makeFilename(r.data)+".doc"); }}>
              📝 DOC 저장
            </button>
            <button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px",marginLeft:"auto"}}
              onClick={()=>deleteReport(r)}>
              🗑 삭제
            </button>
          </div>
        </div>
      ))}
      <button className="btn btn-ghost" style={{width:"100%",marginTop:12}} onClick={onClose}>닫기</button>
    </div>
  </div>;
}






function ApiKeyManager(){
  const [apiKey,setApiKey]=useState("");
  const [saved,setSaved]=useState("");
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        await waitFb();
        const {doc,getDoc}=window._fbFns;
        const snap=await getDoc(doc(window._fbDb,"adminConfig","gemini"));
        if(snap.exists()&&snap.data().apiKey){
          setSaved(snap.data().apiKey);
          setApiKey(snap.data().apiKey);
        }
      }catch(e){console.error(e);}
      setLoading(false);
    })();
  },[]);

  const saveKey=async()=>{
    if(!apiKey.trim()){alert("API 키를 입력하세요.");return;}
    setSaving(true);
    try{
      await waitFb();
      const {doc,setDoc,serverTimestamp}=window._fbFns;
      await setDoc(doc(window._fbDb,"adminConfig","gemini"),{
        apiKey:apiKey.trim(),
        updatedAt:serverTimestamp()
      });
      setSaved(apiKey.trim());
      GEMINI_KEY=apiKey.trim();
      alert("✅ API 키가 저장되었습니다!");
    }catch(e){alert("저장 실패: "+e.message);}
    setSaving(false);
  };

  return <div className="fade">
    <div style={{marginBottom:24}}>
      <div style={{fontSize:20,fontWeight:600,marginBottom:4}}>🔑 Gemini API 키 관리</div>
      <div style={{fontSize:13,color:"var(--text3)"}}>
        Google AI Studio에서 발급한 API 키를 입력하세요.<br/>
        저장된 키는 모든 AI 기능에 사용됩니다.
      </div>
    </div>

    {loading ? <AILoad msg="키 불러오는 중..."/> : <>
      {saved&&(
        <div className="info-box" style={{marginBottom:16}}>
          ✅ 현재 저장된 키: <span style={{fontFamily:"var(--mono)",fontSize:11}}>
            {saved.slice(0,8)}{"•".repeat(20)}{saved.slice(-4)}
          </span>
        </div>
      )}
      <div className="fg">
        <label>Gemini API 키</label>
        <input type="password" placeholder="AIzaSy..." value={apiKey}
          onChange={e=>setApiKey(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&saveKey()}/>
      </div>
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <button className="btn btn-primary" style={{flex:1}} onClick={saveKey} disabled={saving}>
          {saving?"저장 중...":"💾 저장"}
        </button>
        {saved&&<button className="btn btn-ghost" onClick={()=>{setApiKey("");setSaved("");
          (async()=>{
            try{
              await waitFb();
              const {doc,setDoc}=window._fbFns;
              await setDoc(doc(window._fbDb,"adminConfig","gemini"),{apiKey:""});
              GEMINI_KEY="";
              alert("키가 삭제되었습니다.");
            }catch(e){alert("삭제 실패:"+e.message);}
          })();
        }}>🗑 삭제</button>}
      </div>

      <div style={{marginTop:24,background:"var(--surface2)",borderRadius:"var(--r2)",padding:"16px",fontSize:12,color:"var(--text3)",lineHeight:1.8}}>
        <div style={{fontWeight:600,color:"var(--text2)",marginBottom:8}}>📌 API 키 발급 방법</div>
        <div>1. <a href="https://aistudio.google.com/apikey" target="_blank" style={{color:"var(--accent)"}}>Google AI Studio</a> 접속</div>
        <div>2. "Create API key" 클릭</div>
        <div>3. 생성된 키 복사 후 위에 입력</div>
      </div>
    </>}
  </div>;
}

  const fetchAll=async()=>{
    setLoading(true);
    try{
      await waitFb();

      const rpSnap=await getDocs(collection(window._fbDb,"reports"));

      const rList=rpSnap.docs.map(d=>({id:d.id,...d.data()}));
      rList.sort((a,b)=>{
        const ta=a.updatedAt?.toMillis?.()||0;
        const tb=b.updatedAt?.toMillis?.()||0;
        return tb-ta;
      });
      setUsers(uList); setReports(rList);
      setStats({totalUsers:uList.length,totalReports:rList.length,totalCoins:uList.reduce((s,u)=>s+(u.coins||0),0)});

    setLoading(false);
  };

  const createUser=async()=>{
    if(!newUser.email||!newUser.password||!newUser.name){setErr("이메일, 비밀번호, 이름은 필수입니다.");return;}
    setLoading(true);setErr("");

      await waitFb();

        email:newUser.email,name:newUser.name,school:newUser.school,
        grade:newUser.grade,coins:parseInt(newUser.coins)||3,role:"student",

            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <label style={{fontSize:11,whiteSpace:"nowrap"}}>학년</label>
              <select value={filterGrade} onChange={e=>setFilterGrade(e.target.value)}
                style={{width:120,padding:"7px 10px",fontSize:12}}>
                <option value="">전체</option>
                {grades.map(g=><option key={g} value={g}>{g}</option>)}

                ✕ 필터 초기화
              </button>}
          </div>
          <table className="admin-table">
            <thead><tr><th>이름</th><th>학교</th><th>학년</th><th>이메일</th><th>코인</th><th>관리</th></tr></thead>
            <tbody>
              {filtered.map(u=>(
                <tr key={u.id}>
                  <td>
                    <span style={{fontWeight:500,color:"var(--accent)",cursor:"pointer",textDecoration:"underline"}}
                      onClick={()=>{
                        const userReports=reports.filter(r=>r.userId===u.id&&!r.deleted);

                      {u.name||"-"}
                    </span>
                  </td>
                  <td style={{fontSize:12,color:"var(--text3)"}}>{u.school||"-"}</td>
                  <td style={{fontSize:12,color:"var(--text3)"}}>{u.grade||"-"}</td>
                  <td style={{fontSize:12,color:"var(--text3)"}}>{u.email}</td>
                  <td><span style={{fontFamily:"var(--mono)",color:"var(--warn)",fontWeight:600}}>🪙 {u.coins||0}</span></td>
                  <td>
                    <div style={{display:"flex",gap:5}}>
                      <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 9px"}}
                        onClick={()=>{const userReports=reports.filter(r=>r.userId===u.id&&!r.deleted);setStudentReportModal({user:u,reports:userReports});}}>
                        📄 보고서
                      </button>
                      <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 9px"}}
                        onClick={()=>setEditUserModal({id:u.id,name:u.name||"",school:u.school||"",grade:u.grade||"",email:u.email})}>
                        ✏️ 수정
                      </button>
                      <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 9px"}}
                        onClick={()=>{setCoinModal({uid:u.id,name:u.name,coins:u.coins||0});setCoinAmount(3);}}>
                        🪙
                      </button>
                      <button className="btn btn-danger" style={{fontSize:11,padding:"3px 9px"}}
                        onClick={()=>deleteUser(u)}>
                        삭제
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
              {filtered.length===0&&<tr><td colSpan={6} style={{textAlign:"center",color:"var(--text3)",padding:"24px"}}>검색 결과가 없습니다.</td></tr>}
            </tbody>
          </table>
        </div>;
      })()}

      {/* ── Coins ── */}
      {tab==="coins"&&<div className="fade">
        <div style={{marginBottom:28}}>
          <div style={{fontSize:20,fontWeight:600,marginBottom:4}}>코인 지급</div>
          <div style={{fontSize:13,color:"var(--text3)"}}>학생 선택 후 코인을 지급하세요.</div>
        </div>
        <div style={{display:"grid",gap:10}}>
          {users.map(u=>(
            <div key={u.id} className="coin-row">
              <div>
                <div style={{fontWeight:500,fontSize:13}}>{u.name} <span style={{fontSize:11,color:"var(--text3)"}}>{u.school} {u.grade}</span></div>
                <div style={{fontSize:11,color:"var(--text3)"}}>{u.email}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontFamily:"var(--mono)",color:"var(--warn)",fontSize:14,fontWeight:600}}>🪙 {u.coins||0}</span>
                <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>{setCoinModal({uid:u.id,name:u.name,coins:u.coins||0});setCoinAmount(5);}}>지급/회수</button>
              </div>
            </div>
          ))}
        </div>
      </div>}

      {/* ── Reports ── */}
      {tab==="reports"&&<div className="fade">
        <div style={{marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:20,fontWeight:600,marginBottom:4}}>보고서 관리</div>
            <div style={{fontSize:13,color:"var(--text3)"}}>학생 보고서를 확인하고 수정·삭제할 수 있습니다.</div>
          </div>
          <button className="btn btn-ghost" onClick={fetchAll} disabled={loading}>🔄 새로고침</button>
        </div>
        <table className="admin-table">
          <thead><tr><th>학생</th><th>학교/학년</th><th>탐구주제</th><th>저장일</th><th>관리</th></tr></thead>
          <tbody>
            {reports.filter(r=>!r.deleted).map(r=>(
              <tr key={r.id}>
                <td>{r.userName||"-"}</td>
                <td style={{fontSize:12,color:"var(--text3)"}}>{r.data?.school||""} {r.data?.grade||""}</td>
                <td style={{maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:13}}>
                  {r.data?.selectedTopic||r.title||"-"}
                </td>
                <td style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>
                  {r.updatedAt?.toDate?.()?.toLocaleDateString("ko-KR")||"-"}
                </td>
                <td>
                  <div style={{display:"flex",gap:5}}>
                    <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 9px"}}
                      onClick={()=>setEditReportModal(JSON.parse(JSON.stringify(r)))}>
                      ✏️ 수정
                    </button>
                    <button className="btn btn-danger" style={{fontSize:11,padding:"3px 9px"}}
                      onClick={()=>deleteReport(r)}>
                      삭제
                    </button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>}

      {/* ── Create user ── */}
      {tab==="create"&&<div className="fade">
        <div style={{marginBottom:28}}>
          <div style={{fontSize:20,fontWeight:600,marginBottom:4}}>학생 계정 생성</div>
          <div style={{fontSize:13,color:"var(--text3)"}}>새 학생 계정을 만듭니다.</div>
        </div>
        {err&&<div className="err-box">{err}</div>}
        <div className="fr2">
          <div className="fg"><label>이름 *</label><input type="text" placeholder="홍길동" value={newUser.name} onChange={e=>setNewUser(p=>({...p,name:e.target.value}))}/></div>
          <div className="fg"><label>이메일 *</label><input type="email" placeholder="student@school.kr" value={newUser.email} onChange={e=>setNewUser(p=>({...p,email:e.target.value}))}/></div>
        </div>
        <div className="fr2">
          <div className="fg"><label>비밀번호 * (6자 이상)</label><input type="password" placeholder="••••••••" value={newUser.password} onChange={e=>setNewUser(p=>({...p,password:e.target.value}))}/></div>
          <div className="fg"><label>초기 코인</label><input type="text" placeholder="5" value={newUser.coins} onChange={e=>setNewUser(p=>({...p,coins:e.target.value}))}/></div>
        </div>
        <div className="fr2">
          <div className="fg"><label>학교명</label><input type="text" placeholder="○○고등학교" value={newUser.school} onChange={e=>setNewUser(p=>({...p,school:e.target.value}))}/></div>
          <div className="fg"><label>학년</label>
            <select value={newUser.grade} onChange={e=>setNewUser(p=>({...p,grade:e.target.value}))}>
              <option value="">선택</option>
              {["1학년","2학년","3학년"].map(g=><option key={g}>{g}</option>)}
            </select>
          </div>
        </div>
        <button className="btn btn-primary" style={{marginTop:8}} onClick={createUser} disabled={loading}>
          {loading?"생성 중...":"✅ 학생 계정 생성"}
        </button>
      </div>}

      {/* ── Rubric ── */}

      {/* ── API Key ── */}
      {tab==="apikey"&&<ApiKeyManager/>}
    </div>

    {/* ── 코인 모달 ── */}
    {coinModal&&<div className="modal-bg" onClick={()=>setCoinModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>🪙 코인 관리 — {coinModal.name}</h3>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:32,fontWeight:700,color:"var(--warn)",fontFamily:"var(--mono)"}}>🪙 {coinModal.coins}</div>
          <div style={{fontSize:12,color:"var(--text3)"}}>현재 보유 코인</div>
        </div>
        <div className="fg"><label>지급/회수 수량</label>
          <input type="text" value={coinAmount} onChange={e=>setCoinAmount(e.target.value)} placeholder="숫자 입력"/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={giveCoins}>+ {coinAmount}개 지급</button>
          <button className="btn btn-danger" style={{flex:1}} onClick={takeCoins}>- {coinAmount}개 회수</button>
        </div>
        <button className="btn btn-ghost" style={{width:"100%",marginTop:10}} onClick={()=>setCoinModal(null)}>취소</button>
      </div>
    </div>}

    {/* ── 학생 편집 모달 ── */}
    {editUserModal&&<div className="modal-bg" onClick={()=>setEditUserModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>✏️ 학생 정보 수정</h3>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:16}}>{editUserModal.email}</div>
        <div className="fg"><label>이름</label>
          <input type="text" value={editUserModal.name} onChange={e=>setEditUserModal(p=>({...p,name:e.target.value}))}/>
        </div>
        <div className="fg"><label>학교명</label>
          <input type="text" value={editUserModal.school} onChange={e=>setEditUserModal(p=>({...p,school:e.target.value}))}/>
        </div>
        <div className="fg"><label>학년</label>
          <select value={editUserModal.grade} onChange={e=>setEditUserModal(p=>({...p,grade:e.target.value}))}>
            <option value="">선택</option>
            {["1학년","2학년","3학년"].map(g=><option key={g}>{g}</option>)}
          </select>
        </div>
        <div className="fg"><label>비밀번호 초기화 (선택)</label>
          <input type="password" placeholder="새 비밀번호 입력 시 초기화됨 (빈칸이면 유지)"
            value={editUserModal.newPw||""} onChange={e=>setEditUserModal(p=>({...p,newPw:e.target.value}))}/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={saveEditUser}>✅ 저장</button>
          <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setEditUserModal(null)}>취소</button>
        </div>
      </div>
    </div>}

    {/* ── 학생 보고서 뷰어 모달 ── */}
    {studentReportModal&&<div className="modal-bg" onClick={()=>setStudentReportModal(null)}>
      <div className="modal" style={{maxWidth:700,maxHeight:"90vh"}} onClick={e=>e.stopPropagation()}>
        <h3>📄 {studentReportModal.user.name}님의 보고서</h3>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:16}}>
          {studentReportModal.user.school} {studentReportModal.user.grade} · {studentReportModal.user.email} · 🪙 {studentReportModal.user.coins||0}
        </div>
        {studentReportModal.reports.length===0?(
          <div style={{textAlign:"center",padding:"32px 0",color:"var(--text3)",fontSize:13}}>저장된 보고서가 없습니다.</div>
        ):(
          studentReportModal.reports.map((r,idx)=>(
            <div key={r.id} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:"16px",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:"var(--text)",marginBottom:3}}>{r.data?.selectedTopic||r.title||"주제 없음"}</div>
                  <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)"}}>
                    {r.updatedAt?.toDate?.()?.toLocaleString("ko-KR")||"날짜 없음"}
                  </div>
                </div>
                <button className="btn btn-success" style={{fontSize:11,padding:"5px 12px",flexShrink:0}}
                  onClick={()=>{
                    if(!r.data)return;
                    const esc=(s)=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
                    const refsH=buildRefsHTML(r.data);
                    const body=`<h1 style="text-align:center;font-size:22px;margin-bottom:4px">${esc(r.data.selectedTopic||"")}</h1>
<p style="text-align:center;color:#555;font-size:13px;margin-bottom:40px">${esc(r.data.school||"")} ${esc(r.data.grade||"")} ${esc(r.data.name||"")}</p>
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">Ⅰ. 서론</h2>
<h3 style="font-size:14px;color:#333;margin-top:18px">1.1 탐구의 동기</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.intro?.motivation||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">1.2 탐구의 목적</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.intro?.purpose||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">1.3 탐구의 필요성</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.intro?.necessity||"")}</p>
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">Ⅱ. 본론</h2>
${(r.data.questions||[]).map((q,i)=>`<h3 style="font-size:14px;color:#333;margin-top:18px">${i+1}. ${esc(q.text)}</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.body?.["q"+i]||"")}</p>`).join("")}
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">Ⅲ. 결론</h2>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.1 탐구 요약</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.conclusion?.summary||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.2 알게 된 점</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.conclusion?.learned||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.3 향상된 역량</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.conclusion?.skills||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.4 추가 탐구 목표</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.conclusion?.future||"")}</p>
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">참고문헌</h2>${refsH}`;
                    const pdfStyle=`@page{size:A4;margin:2.5cm}body{font-family:'맑은 고딕','Noto Sans KR',Arial,sans-serif;font-size:14px;line-height:1.9;color:#111}h1,h2,h3{font-family:'맑은 고딕','Noto Sans KR',Arial,sans-serif}p{margin-bottom:10px}`;
                    const full=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(r.data.selectedTopic||"보고서")}</title><style>${pdfStyle}@media screen{body{padding:2cm;max-width:21cm;margin:0 auto}}</style></head><body>${body}<script>(function(){window.addEventListener("load",function(){setTimeout(function(){window.print();},400);});})()<\/script></body></html>`;
                    const blob=new Blob(["﻿"+full],{type:"text/html;charset=utf-8"});
                    const url=URL.createObjectURL(blob);
                    const a=document.createElement("a");
                    a.href=url;a.download=`${(r.data.selectedTopic||"탐구보고서").slice(0,20).replace(/[\/:*?"<>|]/g,"")}_${(r.data.grade||"").replace("학년","")}_${r.data.name||"학생"}.html`;
                    a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);
                  }}>
                  📄 PDF 저장
                </button>
              </div>
              {/* 보고서 미리보기 (접기/펼치기) */}
              <div style={{fontSize:12,color:"var(--text3)",lineHeight:1.7}}>
                {r.data?.intro?.motivation&&<div><strong>동기:</strong> {r.data.intro.motivation.slice(0,80)}...</div>}
                {r.data?.conclusion?.summary&&<div style={{marginTop:4}}><strong>요약:</strong> {r.data.conclusion.summary.slice(0,80)}...</div>}
              </div>
            </div>
          ))
        )}
        <button className="btn btn-ghost" style={{width:"100%",marginTop:12}} onClick={()=>setStudentReportModal(null)}>닫기</button>
      </div>
    </div>}

    {/* ── 보고서 편집 모달 ── */}
    {editReportModal&&<div className="modal-bg" onClick={()=>setEditReportModal(null)}>
      <div className="modal" style={{maxWidth:720,maxHeight:"90vh"}} onClick={e=>e.stopPropagation()}>
        <h3>✏️ 보고서 수정 — {editReportModal.userName||"학생"}</h3>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:16}}>
          {editReportModal.data?.school} {editReportModal.data?.grade} {editReportModal.data?.name}
        </div>
        <div className="fg"><label>탐구 주제</label>
          <input type="text" value={editReportModal.data?.selectedTopic||""}
            onChange={e=>setEditReportModal(p=>({...p,data:{...p.data,selectedTopic:e.target.value}}))}/>
        </div>
        <div className="sec-label" style={{marginTop:12}}>서론</div>
        {[["motivation","탐구의 동기"],["purpose","탐구의 목적"],["necessity","탐구의 필요성"]].map(([k,lbl])=>(
          <div key={k} className="fg">
            <label>{lbl}</label>
            <textarea rows={3} value={editReportModal.data?.intro?.[k]||""}
              onChange={e=>setEditReportModal(p=>({...p,data:{...p.data,intro:{...p.data.intro,[k]:e.target.value}}}))}/>
          </div>
        ))}
        <div className="sec-label" style={{marginTop:8}}>본론</div>
        {(editReportModal.data?.questions||[]).map((q,i)=>(
          <div key={i} className="fg">
            <label>본론 {i+1} — {q.text}</label>
            <textarea rows={4} value={editReportModal.data?.body?.[`q${i}`]||""}
              onChange={e=>setEditReportModal(p=>({...p,data:{...p.data,body:{...p.data.body,[`q${i}`]:e.target.value}}}))}/>
          </div>
        ))}
        <div className="sec-label" style={{marginTop:8}}>결론</div>
        {[["summary","탐구 요약"],["learned","알게 된 점"],["skills","향상된 역량"],["future","추가 탐구 목표"]].map(([k,lbl])=>(
          <div key={k} className="fg">
            <label>{lbl}</label>
            <textarea rows={3} value={editReportModal.data?.conclusion?.[k]||""}
              onChange={e=>setEditReportModal(p=>({...p,data:{...p.data,conclusion:{...p.data.conclusion,[k]:e.target.value}}}))}/>
          </div>
        ))}
        <div style={{display:"flex",gap:10,marginTop:12,position:"sticky",bottom:0,background:"var(--surface)",padding:"12px 0"}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={saveEditReport}>✅ 저장</button>
          <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setEditReportModal(null)}>취소</button>
        </div>
      </div>
    </div>}
  </div>;
}



// ─── 사용자 정보 수정 모달 ─────────────────────────────────────────────────
function UserProfileModal({user, onClose, onUpdate}){
  const [name,setName]=useState(user.name||"");
  const [school,setSchool]=useState(user.school||"");
  const [grade,setGrade]=useState(user.grade||"");
  const [pwCurr,setPwCurr]=useState("");
  const [pwNew,setPwNew]=useState("");
  const [pwNew2,setPwNew2]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [msg,setMsg]=useState("");
  const [tab,setTab]=useState("info"); // "info" | "pw"

  const saveInfo=async()=>{
    if(!name||!school||!grade){setErr("이름, 학교, 학년은 필수입니다.");return;}
    setLoading(true);setErr("");setMsg("");
    try{
      await waitFb();
      const {doc,updateDoc}=window._fbFns;
      await updateDoc(doc(window._fbDb,"users",user.uid),{name,school,grade});
      setMsg("✅ 정보가 수정되었습니다.");
      onUpdate({...user,name,school,grade});
    }catch(e){setErr("수정 실패: "+e.message);}
    setLoading(false);
  };

  const changePw=async()=>{
    if(!pwCurr){setErr("현재 비밀번호를 입력하세요.");return;}
    if(!pwNew||pwNew.length<6){setErr("새 비밀번호는 6자 이상이어야 합니다.");return;}
    if(pwNew!==pwNew2){setErr("새 비밀번호가 일치하지 않습니다.");return;}
    setLoading(true);setErr("");setMsg("");
    try{
      await waitFb();
      const {signInWithEmailAndPassword}=window._fbFns;
      // 재인증
      await signInWithEmailAndPassword(window._fbAuth,user.email,pwCurr);
      // 비밀번호 변경 (Firebase compat SDK)
      await window._fbAuth.currentUser.updatePassword(pwNew);
      setMsg("✅ 비밀번호가 변경되었습니다.");
      setPwCurr("");setPwNew("");setPwNew2("");
    }catch(e){
      const code=e.code||"";
      if(code==="auth/wrong-password"||code==="auth/invalid-credential")
        setErr("현재 비밀번호가 올바르지 않습니다.");
      else setErr("변경 실패: "+e.message);
    }
    setLoading(false);
  };

  return <div className="modal-bg" onClick={onClose}>
    <div className="modal" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h3 style={{margin:0}}>👤 내 정보 수정</h3>
        <button className="btn btn-ghost" style={{fontSize:11}} onClick={onClose}>닫기</button>
      </div>

      {/* 기본 정보 */}
      <div style={{background:"var(--surface2)",borderRadius:"var(--r)",padding:"10px 14px",marginBottom:16,fontSize:12,color:"var(--text3)"}}>
        <div>📧 {user.email}</div>
        <div style={{marginTop:4}}>🪙 보유 코인: <strong style={{color:"var(--warn)"}}>{user.coins||0}개</strong></div>
      </div>

      {/* 탭 */}
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        <button onClick={()=>{setTab("info");setErr("");setMsg("");}}
          className={"btn "+(tab==="info"?"btn-primary":"btn-ghost")} style={{flex:1,fontSize:12}}>
          기본 정보
        </button>
        <button onClick={()=>{setTab("pw");setErr("");setMsg("");}}
          className={"btn "+(tab==="pw"?"btn-primary":"btn-ghost")} style={{flex:1,fontSize:12}}>
          비밀번호 변경
        </button>
      </div>

      {err&&<div className="err-box" style={{marginBottom:12}}>{err}</div>}
      {msg&&<div className="info-box" style={{marginBottom:12}}>{msg}</div>}

      {tab==="info"&&<>
        <div className="fr2">
          <div className="fg"><label>이름</label>
            <input type="text" value={name} onChange={e=>setName(e.target.value)}/>
          </div>
          <div className="fg"><label>학교명</label>
            <input type="text" value={school} onChange={e=>setSchool(e.target.value)}/>
          </div>
        </div>
        <div className="fg"><label>학년</label>
          <div style={{display:"flex",gap:8}}>
            {["1학년","2학년","3학년"].map(g=>(
              <button key={g} onClick={()=>setGrade(g)}
                className={"btn "+(grade===g?"btn-primary":"btn-ghost")}
                style={{flex:1,fontSize:13}}>{g}</button>
            ))}
          </div>
        </div>
        <button className="btn btn-primary" style={{width:"100%",marginTop:8}} onClick={saveInfo} disabled={loading}>
          {loading?"저장 중...":"✅ 정보 저장"}
        </button>
      </>}

      {tab==="pw"&&<>
        <div className="fg"><label>현재 비밀번호</label>
          <input type="password" placeholder="현재 비밀번호" value={pwCurr} onChange={e=>setPwCurr(e.target.value)}/>
        </div>
        <div className="fg"><label>새 비밀번호 (6자 이상)</label>
          <input type="password" placeholder="새 비밀번호" value={pwNew} onChange={e=>setPwNew(e.target.value)}/>
        </div>
        <div className="fg"><label>새 비밀번호 확인</label>
          <input type="password" placeholder="새 비밀번호 확인" value={pwNew2} onChange={e=>setPwNew2(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&changePw()}/>
        </div>
        <button className="btn btn-primary" style={{width:"100%",marginTop:8}} onClick={changePw} disabled={loading}>
          {loading?"변경 중...":"🔒 비밀번호 변경"}
        </button>
      </>}
    </div>
  </div>;
}

          <div style={{fontSize:13,color:"var(--text3)",marginTop:2}}>{user.school} {user.grade}</div>

        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div className="coin-badge">🪙 {user.coins||0}</div>
          <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setShowProfile(true)}>👤 내 정보</button>
          <button className="btn btn-ghost" style={{fontSize:11}} onClick={onLogout}>로그아웃</button>
        </div>
      </div>

      {/* 새 보고서 시작 */}
      <div style={{background:"var(--surface)",border:"1px solid var(--accent)",borderRadius:"var(--r2)",padding:"24px",marginBottom:20,textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:8}}>✍️</div>

      </div>

      {/* 기존 보고서 목록 */}

          </div>
          <div style={{fontSize:11,color:"var(--text3)",marginBottom:10}}>

          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <button className="btn btn-success" style={{fontSize:11,padding:"4px 10px"}}
              onClick={()=>{ if(r.data) dlPDF(r.data, makeFilename(r.data)+".html"); }}>
              📄 PDF 저장
            </button>
            <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}}

            <button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px",marginLeft:"auto"}}
