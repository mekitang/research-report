<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--surface:#111318;--surface2:#181c24;--surface3:#1e2330;
  --border:#252b3a;--border2:#2e3547;
  --accent:#3b82f6;--accent2:#1d4ed8;--accent-dim:rgba(59,130,246,0.12);--accent-glow:rgba(59,130,246,0.25);
  --text:#e8ecf4;--text2:#9aa5bb;--text3:#5c6b82;
  --danger:#ef4444;--success:#22c55e;--warn:#f59e0b;
  --mono:'Space Mono',monospace;--sans:'Noto Sans KR',sans-serif;
  --r:6px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── Layout ── */
.shell{display:flex;flex-direction:column;min-height:100vh;max-width:960px;margin:0 auto;padding:0 16px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;gap:10px;flex-wrap:wrap;}
.logo{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:2px;white-space:nowrap;}
.logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.prog-track{display:flex;gap:3px;align-items:center;}
.prog-dot{width:18px;height:3px;background:var(--border2);border-radius:2px;transition:background .3s;cursor:pointer;}
.prog-dot.active{background:var(--accent);}
.prog-dot.done{background:var(--accent2);}
.page-name{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap;}
.page-wrap{flex:1;padding:36px 0 60px;}

/* ── Coin badge ── */
.coin-badge{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--warn);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--warn);font-family:var(--mono);}

/* ── Typography ── */
.ph{margin-bottom:32px;}
.ph-num{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:3px;margin-bottom:6px;}
.ph-title{font-size:22px;font-weight:600;letter-spacing:-.3px;}
.ph-sub{font-size:13px;color:var(--text3);margin-top:5px;font-weight:300;}
.divider{height:1px;background:var(--border);margin:24px 0;}
.sec-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);}

/* ── Forms ── */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:18px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono);}
input[type=text],input[type=email],input[type=password],textarea,select{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:14px;padding:10px 13px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}
input[type=text]:focus,input[type=email]:focus,input[type=password]:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
select{appearance:none;cursor:pointer;}
textarea{resize:vertical;min-height:80px;}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .18s;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover:not(:disabled){background:#2563eb;box-shadow:0 0 14px var(--accent-glow);}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-secondary:hover:not(:disabled){border-color:var(--accent);color:var(--text);}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border);padding:7px 13px;font-size:12px;}
.btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--border2);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(239,68,68,.3);padding:7px 13px;font-size:12px;}
.btn-danger:hover:not(:disabled){background:rgba(239,68,68,.08);}
.btn-success{background:var(--success);color:#fff;}
.btn-success:hover:not(:disabled){background:#16a34a;}
.btn-warn{background:rgba(245,158,11,.15);color:var(--warn);border:1px solid rgba(245,158,11,.3);padding:7px 13px;font-size:12px;}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:18px;border-top:1px solid var(--border);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:10px;}
.info-box{background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--r);padding:11px 15px;font-size:12px;color:var(--text2);margin-bottom:14px;}
.warn-box{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:var(--r);padding:11px 15px;font-size:12px;color:var(--warn);margin-bottom:14px;}
.err-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--r);padding:11px 15px;font-size:12px;color:var(--danger);margin-bottom:14px;}

/* ── AI loading ── */
.ai-load{display:flex;align-items:center;gap:10px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);color:var(--text3);font-size:13px;margin:12px 0;}
.pulse{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 1.2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}

/* ── Tags ── */
.tag{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 9px;font-size:12px;color:var(--text2);margin:2px;}
.tag .rm{cursor:pointer;color:var(--text3);font-size:14px;}
.tag .rm:hover{color:var(--danger);}
.tags-box{display:flex;flex-wrap:wrap;gap:3px;min-height:36px;padding:5px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-top:4px;}
.tag-row{display:flex;gap:7px;align-items:center;}
.tag-row input{flex:1;}

/* ── Question cards ── */
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:14px;position:relative;}
.qnum{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:2px;margin-bottom:10px;}

/* ── Topic cards ── */
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:10px;cursor:pointer;transition:all .18s;position:relative;}
.topic-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.topic-card.sel{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 0 1px var(--accent);}
.topic-title{font-size:14px;font-weight:600;margin-bottom:5px;}
.topic-reason{font-size:12px;color:var(--text3);line-height:1.5;}
.topic-check{position:absolute;top:12px;right:12px;width:20px;height:20px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;}

/* ── TOC ── */
.toc-sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:8px;}
.toc-hd{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;}
.toc-badge{font-family:var(--mono);font-size:9px;color:var(--text3);background:var(--surface3);padding:2px 7px;border-radius:3px;}
.toc-items{padding:12px 16px;display:flex;flex-direction:column;gap:7px;}
.toc-item{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text2);}
.toc-dot{width:5px;height:5px;background:var(--border2);border-radius:50%;flex-shrink:0;}
.toc-edit input{background:transparent;border:none;border-bottom:1px dashed var(--border2);color:var(--text2);font-size:13px;padding:2px 0;width:100%;outline:none;font-family:var(--sans);}
.toc-edit input:focus{border-bottom-color:var(--accent);color:var(--text);}

/* ── Choice cards ── */
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;}
.choice-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:24px 20px;cursor:pointer;transition:all .18s;text-align:center;}
.choice-card:hover{border-color:var(--accent);}
.choice-card.sel{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 0 1px var(--accent);}
.choice-icon{font-size:26px;margin-bottom:8px;}
.choice-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.choice-desc{font-size:12px;color:var(--text3);line-height:1.5;}

/* ── Vol buttons ── */
.vol-opts{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px;}
.vol-btn{padding:7px 16px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;font-family:var(--sans);}
.vol-btn:hover{border-color:var(--accent);color:var(--text);}
.vol-btn.sel{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
.style-btn{padding:7px 14px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--sans);}
.style-btn:hover{border-color:var(--accent);color:var(--text);}
.style-btn.sel{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}

/* ── Preview ── */
.prev-sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:26px;margin-bottom:18px;}
.prev-sec h2{font-size:16px;font-weight:600;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.prev-sec h3{font-size:13px;font-weight:600;color:var(--text2);margin:14px 0 6px;}
.prev-sec p{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:8px;white-space:pre-wrap;}
.ai-out{background:var(--surface2);border:1px solid var(--border2);border-left:3px solid var(--success);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-wrap;}

/* ── Eval ── */
.eval-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px;}
.eval-lbl{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}

/* ── Ref list ── */
.ref-list{list-style:none;padding:0;}
.ref-list li{font-size:12px;color:var(--text3);padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:7px;}
.ref-list li::before{content:'—';flex-shrink:0;}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:28px;max-width:580px;width:100%;max-height:85vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;}

/* ── Save items ── */
.save-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
.save-item:hover{border-color:var(--accent);}
.save-item-title{font-size:13px;font-weight:500;color:var(--text);}
.save-item-meta{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono);}

/* ── Char count ── */
.char-count{font-size:11px;color:var(--text3);text-align:right;margin-top:3px;font-family:var(--mono);}
.char-ok{color:var(--success);}
.char-warn{color:var(--warn);}

/* ── Admin table ── */
.admin-table{width:100%;border-collapse:collapse;font-size:13px;}
.admin-table th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:1px;border-bottom:1px solid var(--border);}
.admin-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text2);}
.admin-table tr:hover td{background:var(--surface2);}

/* ── Login screen ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:40px;max-width:400px;width:100%;}
.login-logo{font-family:var(--mono);font-size:13px;color:var(--text3);letter-spacing:3px;text-align:center;margin-bottom:32px;}
.login-logo span{color:var(--accent);}
.login-title{font-size:20px;font-weight:600;text-align:center;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px;}

/* ── Coin modal ── */
.coin-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.coin-row:last-child{border-bottom:none;}

/* ── Misc ── */
.fade{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
@media(max-width:600px){.fr3,.fr2,.choice-grid{grid-template-columns:1fr;}.prog-dot{width:13px;}}

/* ── Admin layout ── */
.admin-shell{display:flex;min-height:100vh;}
.admin-sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;flex-shrink:0;}
.admin-main{flex:1;padding:32px;overflow-y:auto;}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--text3);cursor:pointer;transition:all .15s;}
.admin-nav-item:hover{color:var(--text);background:var(--surface2);}
.admin-nav-item.active{color:var(--accent);background:var(--accent-dim);border-right:2px solid var(--accent);}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;text-align:center;}
.stat-num{font-size:28px;font-weight:700;color:var(--accent);font-family:var(--mono);}
.stat-label{font-size:12px;color:var(--text3);margin-top:4px;}
</style>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ─── Constants ────────────────────────────────────────────────────────────
let GEMINI_KEY = ""; // Firestore에서 로드됨
const MODEL      = "gemini-2.5-flash";
const PAGES      = ["기본정보","관심분야","주제추천","소주제구성","작성방식","서론","본론","결론","전체보기","교정본","자기평가서","말투변환"];

// ─── Gemini ───────────────────────────────────────────────────────────────
async function loadGeminiKey(){
  if(GEMINI_KEY) return true;
  try{
    await waitFb();
    const {doc,getDoc}=window._fbFns;
    const snap=await getDoc(doc(window._fbDb,"adminConfig","gemini"));
    if(snap.exists()&&snap.data().apiKey){
      GEMINI_KEY=snap.data().apiKey;
      return true;
    }
  }catch(e){console.warn("키 로드 실패:",e.message);}
  return false;
}

// 마크다운 정리 함수 (표·굵은글씨 제거)
function cleanMarkdown(text){
  if(!text) return text;
  var lines = String(text).split("\n");
  var out = [];
  for(var i=0; i<lines.length; i++){
    var line = lines[i];
    // ** 굵은글씨 제거
    while(line.indexOf("**") >= 0){
      var a = line.indexOf("**");
      var b = line.indexOf("**", a+2);
      if(b >= 0){ line = line.slice(0,a) + line.slice(a+2,b) + line.slice(b+2); }
      else { line = line.slice(0,a) + line.slice(a+2); }
    }
    // 표 구분선 (|---|) 제거
    var stripped = line.replace(/ /g,"").replace(/\t/g,"");
    if(stripped.length > 0 && stripped.split("").every(function(c){ return c==="|"||c==="-"||c===":"||c===" "; })){
      continue;
    }
    // 표 행 (| 로 시작하고 끝) → 쉼표 구분
    if(line.trim().charAt(0)==="|" && line.trim().charAt(line.trim().length-1)==="|"){
      var cells = line.trim().slice(1,-1).split("|").map(function(c){ return c.trim(); }).filter(function(c){ return c.length>0; });
      out.push(cells.join(", "));
      continue;
    }
    out.push(line);
  }
  // 빈줄 3개 이상 → 2개
  var result = out.join("\n");
  while(result.indexOf("\n\n\n") >= 0){ result = result.split("\n\n\n").join("\n\n"); }
  return result.trim();
}


async function gemini(prompt){
  if(!GEMINI_KEY){
    const ok=await loadGeminiKey();
    if(!ok) throw new Error("AI 키가 설정되지 않았습니다. 관리자에게 문의하세요.");
  }
  const p=prompt+"\n\n규칙: 표(|로 구성된 마크다운 표) 사용 금지. 굵은글씨(**텍스트**) 사용 금지. 순수 텍스트와 문단으로만 작성.";
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent`,
    {method:"POST",headers:{"Content-Type":"application/json","x-goog-api-key":GEMINI_KEY},
     body:JSON.stringify({contents:[{parts:[{text:p}],role:"user"}],generationConfig:{temperature:.8,maxOutputTokens:8192}})});
  if(!res.ok){
    const e=await res.json();
    const msg=e.error?.message||"API 오류";
    if(msg.includes("leaked")||msg.includes("invalid")||msg.includes("API key")){
      GEMINI_KEY="";
    }
    throw new Error(msg);
  }
  const d=await res.json();
  const raw=d.candidates?.[0]?.content?.parts?.map(p=>p.text).join("")||"";
  return cleanMarkdown(raw);
}
async function geminiJSON(prompt){
  const raw=await gemini(prompt+"\n\n반드시 JSON만 출력하세요. 마크다운 코드블록 없이 순수 JSON만 반환하세요.");
  try{return JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{return null;}
}
async function geminiSearch(prompt){
  if(!GEMINI_KEY){ await loadGeminiKey(); }
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent`,
    {method:"POST",headers:{"Content-Type":"application/json","x-goog-api-key":GEMINI_KEY},
     body:JSON.stringify({contents:[{parts:[{text:prompt}],role:"user"}],tools:[{googleSearch:{}}],generationConfig:{temperature:.3,maxOutputTokens:8192}})});
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"API 오류");}
  const d=await res.json();
  const text=d.candidates?.[0]?.content?.parts?.map(p=>p.text).join("")||"";

  // ── URL 정제: vertexaisearch 리다이렉트 URL 제거, 실제 URL만 사용 ──
  const BLOCKED=["vertexaisearch.cloud.google.com","grounding-api-redirect","generativelanguage.googleapis.com"];
  const isRealUrl=(url)=>url&&url.startsWith("http")&&!BLOCKED.some(b=>url.includes(b));

  const KOREAN_DOMAINS=["riss.kr","dbpia.co.kr","kiss.kstudy.com","academic.naver.com","kci.go.kr","ndsl.kr","prism.go.kr","moe.go.kr","kedi.re.kr","naver.com","daum.net","chosun.com","hani.co.kr","yonhapnews.co.kr","yna.co.kr","khan.co.kr","donga.com","joins.com","edaily.co.kr","kbs.co.kr","mbc.co.kr","sbs.co.kr","aflnews.co.kr","newsis.com","newspim.com","mt.co.kr","sedaily.com","etnews.com","hankyung.com","mk.co.kr","ohmynews.com","pressian.com"];
  const isKorean=(url)=>KOREAN_DOMAINS.some(d=>url.includes(d))||url.includes(".kr/");

  // 1순위: groundingChunks에서 실제 URL
  const rawChunks=(d.candidates?.[0]?.groundingMetadata?.groundingChunks||[]).filter(c=>c.web?.uri);
  let rawSources=rawChunks.filter(c=>isRealUrl(c.web.uri)).map(c=>({url:c.web.uri,title:c.web.title||c.web.uri}));

  // 2순위: 실제 URL이 없으면 AI 응답 텍스트에서 URL 추출
  if(rawSources.length===0&&text){
    const urlRegex=/https?:\/\/(?!vertexaisearch|grounding-api)[^\s\)\]\}"'<>，。]+/g;
    const found=(text.match(urlRegex)||[]).filter(u=>isRealUrl(u));
    const seen=new Set();
    found.forEach(u=>{
      const clean=u.replace(/[.,;!?。，]$/,"");
      if(!seen.has(clean)){seen.add(clean);rawSources.push({url:clean,title:clean});}
    });
  }

  const koSources=rawSources.filter(s=>isKorean(s.url));
  const enSources=rawSources.filter(s=>!isKorean(s.url));
  const sources=[...koSources.slice(0,3),...enSources.slice(0,1)];
  return {text,sources};
}

function LoginScreen({onLogin}){
  const [mode,setMode]=useState("login"); // "login" | "signup"
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [pw2,setPw2]=useState("");
  const [name,setName]=useState("");
  const [school,setSchool]=useState("");
  const [grade,setGrade]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [success,setSuccess]=useState("");

  const errMsg=(code)=>({
    "auth/user-not-found":"등록되지 않은 계정입니다.",
    "auth/wrong-password":"비밀번호가 올바르지 않습니다.",
    "auth/invalid-email":"이메일 형식이 올바르지 않습니다.",
    "auth/invalid-credential":"이메일 또는 비밀번호가 올바르지 않습니다.",
    "auth/too-many-requests":"잠시 후 다시 시도해주세요.",
    "auth/email-already-in-use":"이미 사용 중인 이메일입니다.",
    "auth/weak-password":"비밀번호는 6자 이상이어야 합니다.",
  }[code]||"오류가 발생했습니다. 다시 시도해주세요.");

  const doLogin=async()=>{
    if(!email||!pw){setErr("이메일과 비밀번호를 입력하세요.");return;}
    setLoading(true);setErr("");
    try{
      await waitFb();
      const {signInWithEmailAndPassword,doc,getDoc}=window._fbFns;
      const cred=await signInWithEmailAndPassword(window._fbAuth,email,pw);
      const snap=await getDoc(doc(window._fbDb,"users",cred.user.uid));
      if(!snap.exists()){setErr("사용자 정보를 찾을 수 없습니다.");setLoading(false);return;}
      onLogin({uid:cred.user.uid,...snap.data()});
    }catch(e){setErr(errMsg(e.code));}
    setLoading(false);
  };

  const doSignup=async()=>{
    if(!email||!pw||!pw2||!name||!school||!grade){setErr("모든 항목을 입력해주세요.");return;}
    if(pw!==pw2){setErr("비밀번호가 일치하지 않습니다.");return;}
    if(pw.length<6){setErr("비밀번호는 6자 이상이어야 합니다.");return;}
    setLoading(true);setErr("");
    try{
      await waitFb();
      const {createUserWithEmailAndPassword,doc,setDoc}=window._fbFns;
      const cred=await createUserWithEmailAndPassword(window._fbAuth,email,pw);
      await setDoc(doc(window._fbDb,"users",cred.user.uid),{
        email,name,school,grade,
        coins:0,          // 초기 코인 0 — 관리자가 지급
        role:"student",
        createdAt:new Date().toISOString()
      });
      setSuccess("회원가입이 완료되었습니다! 선생님께 코인 지급을 요청하세요.");
      setMode("login");
      setEmail("");setPw("");setPw2("");setName("");setSchool("");setGrade("");
    }catch(e){setErr(errMsg(e.code));}
    setLoading(false);
  };

  const switchMode=(m)=>{setMode(m);setErr("");setSuccess("");};

  return <div className="login-wrap">
    <div className="login-box fade">
      <div className="login-logo">STUDY<span>.</span>AI</div>
      <div className="login-title">탐구보고서 AI 시스템</div>

      {/* 탭 */}
      <div style={{display:"flex",background:"var(--surface2)",borderRadius:"var(--r)",padding:3,marginBottom:24,gap:2}}>
        <button onClick={()=>switchMode("login")} style={{flex:1,padding:"8px",border:"none",borderRadius:"var(--r)",cursor:"pointer",transition:"all .2s",
          background:mode==="login"?"var(--accent)":"transparent",color:mode==="login"?"#fff":"var(--text3)",fontSize:13,fontFamily:"var(--sans)",fontWeight:500}}>
          로그인
        </button>
        <button onClick={()=>switchMode("signup")} style={{flex:1,padding:"8px",border:"none",borderRadius:"var(--r)",cursor:"pointer",transition:"all .2s",
          background:mode==="signup"?"var(--accent)":"transparent",color:mode==="signup"?"#fff":"var(--text3)",fontSize:13,fontFamily:"var(--sans)",fontWeight:500}}>
          회원가입
        </button>
      </div>

      {err&&<div className="err-box">{err}</div>}
      {success&&<div className="info-box" style={{borderColor:"var(--success)",background:"rgba(34,197,94,0.1)",color:"var(--success)"}}>{success}</div>}

      {/* 로그인 폼 */}
      {mode==="login"&&<>
        <div className="fg"><label>이메일</label>
          <input type="email" placeholder="student@school.kr" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        </div>
        <div className="fg"><label>비밀번호</label>
          <input type="password" placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        </div>
        <button className="btn btn-primary" style={{width:"100%",marginTop:8,padding:"12px"}} onClick={doLogin} disabled={loading}>
          {loading?"로그인 중...":"로그인"}

// ─── SAVE/LOAD MODAL ───────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
function SaveModal({onClose,data,user,onLoad,reportId,onReportIdSet}){
  const [saves,setSaves]=useState([]);
  const [loading,setLoading]=useState(false);
  const [saveMsg,setSaveMsg]=useState("");

  useEffect(()=>{ loadSaves(); },[]);

  const loadSaves=async()=>{
    setLoading(true);
    try{
      await waitFb();
      const {collection,query,where,getDocs}=window._fbFns;
      const q=query(collection(window._fbDb,"reports"),where("userId","==",user.uid));
      const snap=await getDocs(q);
      const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
      docs.sort((a,b)=>{
        const ta=a.updatedAt?.toMillis?.()|| new Date(a.updatedAt||0).getTime();
        const tb=b.updatedAt?.toMillis?.()|| new Date(b.updatedAt||0).getTime();
        return tb-ta;
      });
      setSaves(docs);
    }catch(e){console.error(e);}
    setLoading(false);
  };

  const doSave=async()=>{
    setLoading(true);setSaveMsg("");
    try{
      await waitFb();
      const {doc,setDoc,serverTimestamp}=window._fbFns;
      // reportId가 있으면 같은 문서에 덮어쓰기, 없으면 새 ID 생성
      const id=reportId||(user.uid+"_"+Date.now());
      const title=`${data.school||"미입력"} ${data.grade||""} ${data.name||""} — ${data.selectedTopic||"주제 미선택"}`;
      // 페이지 잠금: 이미 저장된 reportId가 있으면 maxSavedPage 기록
      const saveData={
        userId:user.uid, userName:user.name||"",
        title, data:JSON.parse(JSON.stringify(data)),
        updatedAt:serverTimestamp(),
        reportId:id
      };
      await setDoc(doc(window._fbDb,"reports",id), saveData, {merge:true});
      if(onReportIdSet) onReportIdSet(id);
      setSaveMsg("✅ 저장되었습니다!");
      loadSaves();
    }catch(e){setSaveMsg("❌ 저장 실패: "+e.message);}
    setLoading(false);
  };

  const doLoad=(item)=>{
    if(window.confirm("불러오면 현재 작업이 사라집니다. 계속할까요?")){
      onLoad(item.data, item.reportId||item.id);
      onClose();
    }
  };

  return <div className="modal-bg" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h3>💾 저장 / 불러오기</h3>
      <button className="btn btn-primary" style={{width:"100%",marginBottom:8}} onClick={doSave} disabled={loading}>
        {loading?"저장 중...":"💾 현재 작업 저장"}
      </button>
      {saveMsg&&<div style={{fontSize:12,textAlign:"center",color:saveMsg.startsWith("✅")?"var(--success)":"var(--danger)",marginBottom:10}}>{saveMsg}</div>}
      {loading&&<AILoad msg="저장 중..."/>}
      <div className="sec-label" style={{marginTop:16}}>저장된 보고서 목록</div>
      {saves.length===0&&!loading&&<div style={{color:"var(--text3)",fontSize:13,textAlign:"center",padding:"16px 0"}}>저장된 보고서가 없습니다.</div>}
      {saves.map((s)=>(
        <div key={s.id} className="save-item" onClick={()=>doLoad(s)}>
          <div className="save-item-title">{s.title}</div>
          <div className="save-item-meta">{s.updatedAt?.toDate?.()?.toLocaleString("ko-KR")||"날짜 없음"}</div>
        </div>
      ))}
      <button className="btn btn-ghost" style={{width:"100%",marginTop:12}} onClick={onClose}>닫기</button>
    </div>
  </div>;
}

function ApiKeyManager(){
  const [key,setKey]=useState("");
  const [saved,setSaved]=useState("");
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState("");

  useEffect(()=>{
    (async()=>{
      try{
        await waitFb();
        const {doc,getDoc}=window._fbFns;
        const snap=await getDoc(doc(window._fbDb,"adminConfig","gemini"));
        if(snap.exists()&&snap.data().apiKey){
          setSaved("AIza••••••••••••••••••"+snap.data().apiKey.slice(-4));
        }
      }catch(e){}
    })();
  },[]);

  const saveKey=async()=>{
    if(!key.trim()){setMsg("❌ API 키를 입력해주세요.");return;}
    if(!key.startsWith("AIza")){setMsg("❌ 올바른 Gemini API 키 형식이 아닙니다. (AIza... 로 시작해야 함)");return;}
    setLoading(true);setMsg("");
    try{
      await waitFb();
      const {doc,setDoc}=window._fbFns;
      await setDoc(doc(window._fbDb,"adminConfig","gemini"),{apiKey:key.trim()},{merge:true});
      GEMINI_KEY=key.trim();
      setSaved("AIza••••••••••••••••••"+key.slice(-4));
      setKey("");
      setMsg("✅ API 키가 저장되었습니다! 학생들이 AI 기능을 바로 사용할 수 있습니다.");
    }catch(e){setMsg("❌ 저장 실패: "+e.message);}
    setLoading(false);
  };

  return <div className="fade">
    <div style={{marginBottom:28}}>
      <div style={{fontSize:20,fontWeight:600,marginBottom:4}}>🔑 AI 키 관리</div>
      <div style={{fontSize:13,color:"var(--text3)"}}>Gemini API 키를 안전하게 서버에 저장합니다. GitHub 코드에는 키가 없어 유출되지 않습니다.</div>
    </div>
    {saved&&(
      <div style={{background:"var(--surface2)",border:"1px solid var(--success)",borderRadius:"var(--r2)",padding:"16px 20px",marginBottom:20}}>

        <div style={{fontFamily:"var(--mono)",fontSize:13,color:"var(--success)"}}>{saved}</div>
      </div>
    )}

      📌 키 발급: <a href="https://aistudio.google.com/app/apikey" target="_blank" style={{color:"var(--accent)"}}>aistudio.google.com/app/apikey</a>에서 무료 발급
      <br/>키가 차단되면 새 키를 발급받아 여기에 입력하면 즉시 적용됩니다.
    </div>
    <div className="fg">
      <label>새 Gemini API 키 입력</label>
      <input type="text" placeholder="AIzaSy..." value={key} onChange={e=>setKey(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveKey()}/>
    </div>
    {msg&&<div style={{fontSize:13,color:msg.startsWith("✅")?"var(--success)":"var(--danger)",marginBottom:12}}>{msg}</div>}
    <button className="btn btn-primary" onClick={saveKey} disabled={loading}>{loading?"저장 중...":"🔑 API 키 저장"}</button>
    <div style={{marginTop:28,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:"18px"}}>
      <div className="sec-label" style={{marginBottom:10}}>키 차단 시 대처 방법</div>

        1. <a href="https://aistudio.google.com/app/apikey" target="_blank" style={{color:"var(--accent)"}}>Google AI Studio</a>에서 새 API 키 발급<br/>
        2. 위 입력창에 새 키 붙여넣기 → "API 키 저장" 클릭<br/>
        3. 즉시 적용 — 학생들 재로그인 불필요
      </div>
    </div>
  </div>;
}

      </div>}

      {/* ── Students ── */}
      {tab==="students"&&(()=>{
        // 학교/학년 목록 추출
        const schools=[...new Set(users.map(u=>u.school).filter(Boolean))].sort();
        const grades=["1학년","2학년","3학년"];
        // 필터 적용
        const filtered=users.filter(u=>
          (!filterSchool||u.school===filterSchool)&&
          (!filterGrade||u.grade===filterGrade)
        );
        return <div className="fade">
          <div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:20,fontWeight:600,marginBottom:4}}>학생 관리</div>
              <div style={{fontSize:13,color:"var(--text3)"}}>총 {filtered.length}명 (전체 {users.length}명)</div>
            </div>
            <button className="btn btn-ghost" onClick={fetchAll} disabled={loading}>🔄 새로고침</button>
          </div>
          {/* 검색 필터 */}
          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <label style={{fontSize:11,whiteSpace:"nowrap"}}>학교</label>
              <select value={filterSchool} onChange={e=>setFilterSchool(e.target.value)}
                style={{width:160,padding:"7px 10px",fontSize:12}}>
                <option value="">전체</option>
                {schools.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <label style={{fontSize:11,whiteSpace:"nowrap"}}>학년</label>
              <select value={filterGrade} onChange={e=>setFilterGrade(e.target.value)}
                style={{width:120,padding:"7px 10px",fontSize:12}}>
                <option value="">전체</option>
                {grades.map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            {(filterSchool||filterGrade)&&
              <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>{setFilterSchool("");setFilterGrade("");}}>
                ✕ 필터 초기화
              </button>}
          </div>
          <table className="admin-table">
            <thead><tr><th>이름</th><th>학교</th><th>학년</th><th>이메일</th><th>코인</th><th>관리</th></tr></thead>
            <tbody>
              {filtered.map(u=>(
                <tr key={u.id}>
                  <td>
                    <span style={{fontWeight:500,color:"var(--accent)",cursor:"pointer",textDecoration:"underline"}}
                      onClick={()=>{
                        const userReports=reports.filter(r=>r.userId===u.id&&!r.deleted);
                        setStudentReportModal({user:u, reports:userReports});
                      }}>
                      {u.name||"-"}
                    </span>
                  </td>
                  <td style={{fontSize:12,color:"var(--text3)"}}>{u.school||"-"}</td>
                  <td style={{fontSize:12,color:"var(--text3)"}}>{u.grade||"-"}</td>
                  <td style={{fontSize:12,color:"var(--text3)"}}>{u.email}</td>
                  <td><span style={{fontFamily:"var(--mono)",color:"var(--warn)",fontWeight:600}}>🪙 {u.coins||0}</span></td>
                  <td>
                    <div style={{display:"flex",gap:5}}>
                      <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 9px"}}
                        onClick={()=>{const userReports=reports.filter(r=>r.userId===u.id&&!r.deleted);setStudentReportModal({user:u,reports:userReports});}}>
                        📄 보고서
                      </button>
                      <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 9px"}}
                        onClick={()=>setEditUserModal({id:u.id,name:u.name||"",school:u.school||"",grade:u.grade||"",email:u.email})}>
                        ✏️ 수정
                      </button>
                      <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 9px"}}
                        onClick={()=>{setCoinModal({uid:u.id,name:u.name,coins:u.coins||0});setCoinAmount(3);}}>
                        🪙
                      </button>
                      <button className="btn btn-danger" style={{fontSize:11,padding:"3px 9px"}}
                        onClick={()=>deleteUser(u)}>
                        삭제
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
              {filtered.length===0&&<tr><td colSpan={6} style={{textAlign:"center",color:"var(--text3)",padding:"24px"}}>검색 결과가 없습니다.</td></tr>}
            </tbody>
          </table>
        </div>;
      })()}

      {/* ── Coins ── */}
      {tab==="coins"&&<div className="fade">
        <div style={{marginBottom:28}}>
          <div style={{fontSize:20,fontWeight:600,marginBottom:4}}>코인 지급</div>
          <div style={{fontSize:13,color:"var(--text3)"}}>학생 선택 후 코인을 지급하세요.</div>
        </div>
        <div style={{display:"grid",gap:10}}>
          {users.map(u=>(
            <div key={u.id} className="coin-row">
              <div>
                <div style={{fontWeight:500,fontSize:13}}>{u.name} <span style={{fontSize:11,color:"var(--text3)"}}>{u.school} {u.grade}</span></div>
                <div style={{fontSize:11,color:"var(--text3)"}}>{u.email}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontFamily:"var(--mono)",color:"var(--warn)",fontSize:14,fontWeight:600}}>🪙 {u.coins||0}</span>
                <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>{setCoinModal({uid:u.id,name:u.name,coins:u.coins||0});setCoinAmount(5);}}>지급/회수</button>
              </div>
            </div>
          ))}
        </div>
      </div>}

      {/* ── Reports ── */}
      {tab==="reports"&&<div className="fade">
        <div style={{marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:20,fontWeight:600,marginBottom:4}}>보고서 관리</div>
            <div style={{fontSize:13,color:"var(--text3)"}}>학생 보고서를 확인하고 수정·삭제할 수 있습니다.</div>
          </div>
          <button className="btn btn-ghost" onClick={fetchAll} disabled={loading}>🔄 새로고침</button>
        </div>
        <table className="admin-table">
          <thead><tr><th>학생</th><th>학교/학년</th><th>탐구주제</th><th>저장일</th><th>관리</th></tr></thead>
          <tbody>
            {reports.filter(r=>!r.deleted).map(r=>(
              <tr key={r.id}>
                <td>{r.userName||"-"}</td>
                <td style={{fontSize:12,color:"var(--text3)"}}>{r.data?.school||""} {r.data?.grade||""}</td>
                <td style={{maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:13}}>
                  {r.data?.selectedTopic||r.title||"-"}
                </td>
                <td style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>
                  {r.updatedAt?.toDate?.()?.toLocaleDateString("ko-KR")||"-"}
                </td>
                <td>
                  <div style={{display:"flex",gap:5}}>
                    <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 9px"}}
                      onClick={()=>setEditReportModal(JSON.parse(JSON.stringify(r)))}>
                      ✏️ 수정
                    </button>
                    <button className="btn btn-danger" style={{fontSize:11,padding:"3px 9px"}}
                      onClick={()=>deleteReport(r)}>
                      삭제
                    </button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>}

      {/* ── Create user ── */}
      {tab==="create"&&<div className="fade">
        <div style={{marginBottom:28}}>
          <div style={{fontSize:20,fontWeight:600,marginBottom:4}}>학생 계정 생성</div>
          <div style={{fontSize:13,color:"var(--text3)"}}>새 학생 계정을 만듭니다.</div>
        </div>
        {err&&<div className="err-box">{err}</div>}
        <div className="fr2">
          <div className="fg"><label>이름 *</label><input type="text" placeholder="홍길동" value={newUser.name} onChange={e=>setNewUser(p=>({...p,name:e.target.value}))}/></div>
          <div className="fg"><label>이메일 *</label><input type="email" placeholder="student@school.kr" value={newUser.email} onChange={e=>setNewUser(p=>({...p,email:e.target.value}))}/></div>
        </div>
        <div className="fr2">
          <div className="fg"><label>비밀번호 * (6자 이상)</label><input type="password" placeholder="••••••••" value={newUser.password} onChange={e=>setNewUser(p=>({...p,password:e.target.value}))}/></div>
          <div className="fg"><label>초기 코인</label><input type="text" placeholder="5" value={newUser.coins} onChange={e=>setNewUser(p=>({...p,coins:e.target.value}))}/></div>
        </div>
        <div className="fr2">
          <div className="fg"><label>학교명</label><input type="text" placeholder="○○고등학교" value={newUser.school} onChange={e=>setNewUser(p=>({...p,school:e.target.value}))}/></div>
          <div className="fg"><label>학년</label>
            <select value={newUser.grade} onChange={e=>setNewUser(p=>({...p,grade:e.target.value}))}>
              <option value="">선택</option>
              {["1학년","2학년","3학년"].map(g=><option key={g}>{g}</option>)}
            </select>
          </div>
        </div>
        <button className="btn btn-primary" style={{marginTop:8}} onClick={createUser} disabled={loading}>
          {loading?"생성 중...":"✅ 학생 계정 생성"}
        </button>
      </div>}

      {/* ── API Key ── */}
      {tab==="apikey"&&<ApiKeyManager/>}
    </div>

    {/* ── 코인 모달 ── */}
    {coinModal&&<div className="modal-bg" onClick={()=>setCoinModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>🪙 코인 관리 — {coinModal.name}</h3>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:32,fontWeight:700,color:"var(--warn)",fontFamily:"var(--mono)"}}>🪙 {coinModal.coins}</div>
          <div style={{fontSize:12,color:"var(--text3)"}}>현재 보유 코인</div>
        </div>
        <div className="fg"><label>지급/회수 수량</label>
          <input type="text" value={coinAmount} onChange={e=>setCoinAmount(e.target.value)} placeholder="숫자 입력"/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={giveCoins}>+ {coinAmount}개 지급</button>
          <button className="btn btn-danger" style={{flex:1}} onClick={takeCoins}>- {coinAmount}개 회수</button>
        </div>
        <button className="btn btn-ghost" style={{width:"100%",marginTop:10}} onClick={()=>setCoinModal(null)}>취소</button>
      </div>
    </div>}

    {/* ── 학생 편집 모달 ── */}
    {editUserModal&&<div className="modal-bg" onClick={()=>setEditUserModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>✏️ 학생 정보 수정</h3>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:16}}>{editUserModal.email}</div>
        <div className="fg"><label>이름</label>
          <input type="text" value={editUserModal.name} onChange={e=>setEditUserModal(p=>({...p,name:e.target.value}))}/>
        </div>
        <div className="fg"><label>학교명</label>
          <input type="text" value={editUserModal.school} onChange={e=>setEditUserModal(p=>({...p,school:e.target.value}))}/>
        </div>
        <div className="fg"><label>학년</label>
          <select value={editUserModal.grade} onChange={e=>setEditUserModal(p=>({...p,grade:e.target.value}))}>
            <option value="">선택</option>
            {["1학년","2학년","3학년"].map(g=><option key={g}>{g}</option>)}
          </select>
        </div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={saveEditUser}>✅ 저장</button>
          <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setEditUserModal(null)}>취소</button>
        </div>
      </div>
    </div>}

    {/* ── 학생 보고서 뷰어 모달 ── */}
    {studentReportModal&&<div className="modal-bg" onClick={()=>setStudentReportModal(null)}>
      <div className="modal" style={{maxWidth:700,maxHeight:"90vh"}} onClick={e=>e.stopPropagation()}>
        <h3>📄 {studentReportModal.user.name}님의 보고서</h3>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:16}}>
          {studentReportModal.user.school} {studentReportModal.user.grade} · {studentReportModal.user.email} · 🪙 {studentReportModal.user.coins||0}
        </div>
        {studentReportModal.reports.length===0?(
          <div style={{textAlign:"center",padding:"32px 0",color:"var(--text3)",fontSize:13}}>저장된 보고서가 없습니다.</div>
        ):(
          studentReportModal.reports.map((r,idx)=>(
            <div key={r.id} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:"16px",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:"var(--text)",marginBottom:3}}>{r.data?.selectedTopic||r.title||"주제 없음"}</div>
                  <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)"}}>
                    {r.updatedAt?.toDate?.()?.toLocaleString("ko-KR")||"날짜 없음"}
                  </div>
                </div>
                <button className="btn btn-success" style={{fontSize:11,padding:"5px 12px",flexShrink:0}}
                  onClick={()=>{
                    if(!r.data)return;
                    const esc=(s)=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
                    const refsH=buildRefsHTML(r.data);
                    const body=`<h1 style="text-align:center;font-size:22px;margin-bottom:4px">${esc(r.data.selectedTopic||"")}</h1>
<p style="text-align:center;color:#555;font-size:13px;margin-bottom:40px">${esc(r.data.school||"")} ${esc(r.data.grade||"")} ${esc(r.data.name||"")}</p>
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">Ⅰ. 서론</h2>
<h3 style="font-size:14px;color:#333;margin-top:18px">1.1 탐구의 동기</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.intro?.motivation||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">1.2 탐구의 목적</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.intro?.purpose||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">1.3 탐구의 필요성</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.intro?.necessity||"")}</p>
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">Ⅱ. 본론</h2>
${(r.data.questions||[]).map((q,i)=>`<h3 style="font-size:14px;color:#333;margin-top:18px">${i+1}. ${esc(q.text)}</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.body?.["q"+i]||"")}</p>`).join("")}
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">Ⅲ. 결론</h2>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.1 탐구 요약</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.conclusion?.summary||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.2 알게 된 점</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.conclusion?.learned||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.3 향상된 역량</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.conclusion?.skills||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.4 추가 탐구 목표</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(r.data.conclusion?.future||"")}</p>
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">참고문헌</h2>${refsH}`;
                    const pdfStyle=`@page{size:A4;margin:2.5cm}body{font-family:'맑은 고딕','Noto Sans KR',Arial,sans-serif;font-size:14px;line-height:1.9;color:#111}h1,h2,h3{font-family:'맑은 고딕','Noto Sans KR',Arial,sans-serif}p{margin-bottom:10px}`;
                    const full=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(r.data.selectedTopic||"보고서")}</title><style>${pdfStyle}@media screen{body{padding:2cm;max-width:21cm;margin:0 auto}}</style></head><body>${body}<script>(function(){window.addEventListener("load",function(){setTimeout(function(){window.print();},400);});})()<\/script></body></html>`;
                    const blob=new Blob(["﻿"+full],{type:"text/html;charset=utf-8"});
                    const url=URL.createObjectURL(blob);
                    const a=document.createElement("a");
                    a.href=url;a.download=`${(r.data.selectedTopic||"탐구보고서").slice(0,20).replace(/[\/:*?"<>|]/g,"")}_${(r.data.grade||"").replace("학년","")}_${r.data.name||"학생"}.html`;
                    a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);
                  }}>
                  📄 PDF 저장
                </button>
              </div>
              {/* 보고서 미리보기 (접기/펼치기) */}
              <div style={{fontSize:12,color:"var(--text3)",lineHeight:1.7}}>
                {r.data?.intro?.motivation&&<div><strong>동기:</strong> {r.data.intro.motivation.slice(0,80)}...</div>}
                {r.data?.conclusion?.summary&&<div style={{marginTop:4}}><strong>요약:</strong> {r.data.conclusion.summary.slice(0,80)}...</div>}
              </div>
            </div>
          ))
        )}
        <button className="btn btn-ghost" style={{width:"100%",marginTop:12}} onClick={()=>setStudentReportModal(null)}>닫기</button>
      </div>
    </div>}

    {/* ── 보고서 편집 모달 ── */}
    {editReportModal&&<div className="modal-bg" onClick={()=>setEditReportModal(null)}>
      <div className="modal" style={{maxWidth:720,maxHeight:"90vh"}} onClick={e=>e.stopPropagation()}>
        <h3>✏️ 보고서 수정 — {editReportModal.userName||"학생"}</h3>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:16}}>
          {editReportModal.data?.school} {editReportModal.data?.grade} {editReportModal.data?.name}
        </div>
        <div className="fg"><label>탐구 주제</label>
          <input type="text" value={editReportModal.data?.selectedTopic||""}
            onChange={e=>setEditReportModal(p=>({...p,data:{...p.data,selectedTopic:e.target.value}}))}/>
        </div>
        <div className="sec-label" style={{marginTop:12}}>서론</div>
        {[["motivation","탐구의 동기"],["purpose","탐구의 목적"],["necessity","탐구의 필요성"]].map(([k,lbl])=>(
          <div key={k} className="fg">
            <label>{lbl}</label>
            <textarea rows={3} value={editReportModal.data?.intro?.[k]||""}
              onChange={e=>setEditReportModal(p=>({...p,data:{...p.data,intro:{...p.data.intro,[k]:e.target.value}}}))}/>
          </div>
        ))}
        <div className="sec-label" style={{marginTop:8}}>본론</div>
        {(editReportModal.data?.questions||[]).map((q,i)=>(
          <div key={i} className="fg">
            <label>본론 {i+1} — {q.text}</label>
            <textarea rows={4} value={editReportModal.data?.body?.[`q${i}`]||""}
              onChange={e=>setEditReportModal(p=>({...p,data:{...p.data,body:{...p.data.body,[`q${i}`]:e.target.value}}}))}/>
          </div>
        ))}
        <div className="sec-label" style={{marginTop:8}}>결론</div>
        {[["summary","탐구 요약"],["learned","알게 된 점"],["skills","향상된 역량"],["future","추가 탐구 목표"]].map(([k,lbl])=>(
          <div key={k} className="fg">
            <label>{lbl}</label>
            <textarea rows={3} value={editReportModal.data?.conclusion?.[k]||""}
              onChange={e=>setEditReportModal(p=>({...p,data:{...p.data,conclusion:{...p.data.conclusion,[k]:e.target.value}}}))}/>
          </div>
        ))}
        <div style={{display:"flex",gap:10,marginTop:12,position:"sticky",bottom:0,background:"var(--surface)",padding:"12px 0"}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={saveEditReport}>✅ 저장</button>
          <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setEditReportModal(null)}>취소</button>
        </div>
      </div>
    </div>}
  </div>;
}

// ════════════════════════════════════════════════════════════════════════════
// ─── REPORT APP (학생용 탐구보고서 작성) ────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
function ReportApp({user,onLogout,onCoinUpdate,initData,initReportId,onFinish,onGoHome}){
  const [page,setPage]=useState(0);
  const [showSave,setShowSave]=useState(false);
  const [showReports,setShowReports]=useState(false);
  const [reportId,setReportId]=useState(initReportId||null);
  // maxPage: 저장 이후 되돌아갈 수 있는 최대 페이지 제한
  const [maxSavedPage,setMaxSavedPage]=useState(initData?99:0);
  const [data,setData]=useState(()=>
    initData?{...initData}:{...JSON.parse(JSON.stringify(INIT)),school:user.school||"",grade:user.grade||"",name:user.name||""}
  );

  // toc 동기화
  useEffect(()=>{
    const items=data.questions.map((q,i)=>q.text?`${i+1}. ${q.text}`:`${i+1}번째 탐구 질문`);
    setData(p=>({...p,toc:{...p.toc,body:{items}}}));
  },[data.questions.length,data.questions.map(q=>q.text).join("|")]);

  // 자동저장: 페이지 이동할 때마다 Firebase에 저장
  const autoSave=async(currentData, currentReportId)=>{
    if(!currentReportId) return;
    try{
      await waitFb();
      const {doc,setDoc,serverTimestamp}=window._fbFns;
      const title=`${currentData.school||""} ${currentData.grade||""} ${currentData.name||""} — ${currentData.selectedTopic||"작성 중"}`;
      await setDoc(doc(window._fbDb,"reports",currentReportId),{
        userId:user.uid, userName:user.name||"",
        title, data:JSON.parse(JSON.stringify(currentData)),
        updatedAt:serverTimestamp(),
        reportId:currentReportId
      },{merge:true});
    }catch(e){console.warn("자동저장 실패:",e.message);}
  };

  const go=(n)=>{
    // 페이지 잠금: 저장 전 페이지는 이전 페이지로만 이동 가능
    // maxSavedPage가 0이면 잠금 없음(새 보고서), 저장 후엔 앞 페이지 수정 제한
    if(maxSavedPage>0 && n < page){
      // 이전 페이지로 돌아가는건 허용하되 수정은 읽기전용 처리
    }
    setPage(n);
    window.scrollTo(0,0);
    // 페이지 이동시 자동저장
    if(reportId) autoSave(data, reportId);
  };

  const handleReportIdSet=(id)=>{
    setReportId(id);
    setMaxSavedPage(page); // 현재 페이지까지는 수정 불가 처리
  };



  // 이전 보고서 불러오기
  const handleLoad=(d, id)=>{
    setData(d);
    setReportId(id||null);
    setMaxSavedPage(99); // 불러온 보고서는 모든 페이지 수정 가능
    setShowSave(false);setShowReports(false);
    go(0);
  };

  // 페이지가 이전 저장 페이지보다 앞이면 읽기전용 표시
  const isLocked=(pageIdx)=> maxSavedPage>0 && pageIdx < maxSavedPage && reportId;

  const pages=[
    <P1  data={data} set={setData} user={user} onNext={()=>go(1)}  locked={isLocked(0)}/>,
    <P2  data={data} set={setData} onPrev={()=>go(0)} onNext={()=>go(2)}  locked={isLocked(1)}/>,
    <P4  data={data} set={setData} onPrev={()=>go(1)} onNext={()=>go(3)}  locked={isLocked(2)}/>,
    <P3  data={data} set={setData} onPrev={()=>go(2)} onNext={()=>go(4)}  locked={isLocked(3)}/>,
    <P6  data={data} set={setData} onPrev={()=>go(3)} onNext={()=>go(5)}  locked={isLocked(4)}/>,
    <P7  data={data} set={setData} onPrev={()=>go(4)} onNext={()=>go(6)}  locked={isLocked(5)}/>,
    <P8  data={data} set={setData} onPrev={()=>go(5)} onNext={()=>go(7)}  locked={isLocked(6)}/>,
    <P9  data={data} set={setData} onPrev={()=>go(6)} onNext={()=>go(8)}  locked={isLocked(7)}/>,
    <P10 data={data} set={setData} onPrev={()=>go(7)} onNext={()=>go(9)}/>,
    <P11 data={data} set={setData} onPrev={()=>go(8)} onNext={()=>go(10)}/>,
    <P12 data={data} set={setData} onPrev={()=>go(9)} onNext={()=>go(11)}/>,
    <P13 data={data} set={setData} onPrev={()=>go(10)} onFinish={onFinish}/>,
  ];

  return <div className="shell">
    <div className="topbar">
      <div className="logo">STUDY<span>.</span>AI</div>
      <div className="prog-track">
        {PAGES.map((name,i)=>(
          <div key={i} className={`prog-dot ${i===page?"active":i<page?"done":""}`}
            onClick={()=>go(i)} title={name}
            style={{opacity:isLocked(i)?0.4:1}}/>
        ))}
      </div>
      <div className="topbar-right">
        <div className="page-name">{PAGES[page]}</div>
        <div className="coin-badge">🪙 {user.coins||0}</div>
        {reportId&&<div style={{fontSize:10,fontFamily:"var(--mono)",color:"var(--success)",padding:"3px 8px",border:"1px solid var(--success)",borderRadius:4}}>자동저장 ON</div>}
        <button className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>setShowSave(true)}>💾 저장</button>
        <button className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>setShowReports(true)}>📋 내 보고서</button>
        {onGoHome&&<button className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>{if(window.confirm("홈으로 이동합니다. 작성 중인 내용은 저장된 상태로 유지됩니다."))onGoHome();}}>🏠 홈</button>}

        <button className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}} onClick={onLogout}>로그아웃</button>
      </div>
    </div>
    <div className="page-wrap">{pages[page]}</div>
    {showSave&&<SaveModal data={data} user={user} reportId={reportId}
      onReportIdSet={handleReportIdSet}
      onClose={()=>setShowSave(false)}
      onLoad={handleLoad}/>}
    {showReports&&<MyReportsModal user={user} onClose={()=>setShowReports(false)} onLoad={handleLoad}/>}
  </div>;
}

// ─── My Reports Modal ─────────────────────────────────────────────────────
function MyReportsModal({user,onClose,onLoad}){
  const [reports,setReports]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    (async()=>{
      try{
        await waitFb();
        const {collection,query,where,getDocs}=window._fbFns;
        const q=query(collection(window._fbDb,"reports"),where("userId","==",user.uid));
        const snap=await getDocs(q);
        const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
        // 클라이언트에서 최신순 정렬
        docs.sort((a,b)=>{
          const ta=a.updatedAt?.toMillis?.()|| new Date(a.updatedAt||0).getTime();
          const tb=b.updatedAt?.toMillis?.()|| new Date(b.updatedAt||0).getTime();
          return tb-ta;
        });
        setReports(docs);
      }catch(e){console.error(e);}
      setLoading(false);
    })();
  },[]);

  return <div className="modal-bg" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h3>📋 내 보고서 목록</h3>
      {loading&&<AILoad msg="불러오는 중..."/>}
      {!loading&&reports.length===0&&<div style={{color:"var(--text3)",fontSize:13,textAlign:"center",padding:"20px 0"}}>저장된 보고서가 없습니다.</div>}
      {reports.map(r=>(
        <div key={r.id} className="save-item" onClick={()=>onLoad(r.data, r.reportId||r.id)}>
          <div className="save-item-title">{r.data?.selectedTopic||r.title||"주제 없음"}</div>
          <div style={{fontSize:11,color:"var(--text3)",marginTop:3,display:"flex",gap:10}}>
            <span>{r.data?.school||""} {r.data?.grade||""} {r.data?.name||""}</span>
            <span style={{fontFamily:"var(--mono)"}}>{r.updatedAt?.toDate?.()?.toLocaleString("ko-KR")||"날짜 없음"}</span>
          </div>
        </div>
      ))}
      <button className="btn btn-ghost" style={{width:"100%",marginTop:12}} onClick={onClose}>닫기</button>
    </div>
  </div>;
}

        <select value={data.grade} onChange={e=>set(p=>({...p,grade:e.target.value}))}>

  const FIELDS=["자연과학","생명과학·의학","공학·기술","수학·통계","사회과학","인문학","예술·문화","경제·경영","환경·지구과학","심리학·교육학"];
  const addKw=()=>{const v=kw.trim();if(v&&!data.keywords.includes(v))set(p=>({...p,keywords:[...p.keywords,v]}));setKw("");};
  return <div className="fade">
    <PH page={2} title="관심 분야 & 키워드" sub="관심 분야와 핵심 키워드를 입력하세요."/>
    <div className="fg"><label>관심 분야</label>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
        {FIELDS.map(f=><button key={f} className={`vol-btn ${data.field===f?"sel":""}`} onClick={()=>set(p=>({...p,field:f}))}>{f}</button>)}
      </div>
      <input type="text" placeholder="직접 입력..." value={data.field} onChange={e=>set(p=>({...p,field:e.target.value}))}/>
    </div>
    <div className="fg"><label>세부 관심 주제</label>
      <textarea rows={3} value={data.interest} onChange={e=>set(p=>({...p,interest:e.target.value}))} placeholder="예: 인공지능이 의료 진단에 미치는 영향에 관심이 있습니다..."/>
    </div>
    <div className="fg"><label>키워드</label>
      <div className="tag-row">
        <input type="text" placeholder="키워드 입력 후 Enter" value={kw} onChange={e=>setKw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addKw()}/>
        <button className="btn btn-ghost" onClick={addKw}>추가</button>
      </div>
      <div className="tags-box">
        {data.keywords.length===0&&<span style={{fontSize:12,color:"var(--text3)"}}>키워드를 추가하세요</span>}
        {data.keywords.map(k=><span key={k} className="tag">{k}<span className="rm" onClick={()=>set(p=>({...p,keywords:p.keywords.filter(x=>x!==k)}))}>×</span></span>)}
      </div>
    </div>
    <NavRow page={1} onPrev={onPrev} onNext={onNext} nextDisabled={!data.field||!data.interest}/>
  </div>;

function P3({data,set,onPrev,onNext}){
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const subCount=data.subTopicCount||3;
  const [enCount,setEnCount]=useState(1); // 해외 자료 최대 개수

  const changeSubCount=(n)=>{
    set(p=>{
      const cur=p.questions||[];
      let newQ;
      if(n>cur.length){
        newQ=[...cur,...Array(n-cur.length).fill(null).map(()=>({text:"",reason:"",link:"",links:[]}))];
      } else {
        newQ=cur.slice(0,n);
      }
      return {...p,subTopicCount:n,questions:newQ};
    });
  };

  const updQ=(i,v)=>{
    const q=[...data.questions];q[i]={...q[i],text:v};set(p=>({...p,questions:q}));
  };

  const aiGenSubTopics=async()=>{
    if(!data.selectedTopic){setErr("먼저 이전 페이지에서 탐구 주제를 선택하세요.");return;}
    setLoading(true);setErr("");
    try{
      const lvlDesc={
        easy:"기초 수준 — 개념 설명, 현황 조사, 사례 비교 위주",
        mid:"심화 수준 — 원인 분석, 영향 관계, 비교 분석 포함",
        hard:"고급 수준 — 비판적 분석, 데이터 해석, 실험적 접근"
      };
      const r=await geminiJSON(`고등학생 탐구보고서 본론 소주제를 정확히 ${subCount}개 추천해주세요. 반드시 ${subCount}개를 생성해야 합니다.
탐구 주제: ${data.selectedTopic}
관심 분야: ${data.field}
난이도: ${lvlDesc[data.topicLevel||"mid"]}
학년: ${data.grade}

조건:
1. 소주제 수: 정확히 ${subCount}개 (더 많거나 적으면 안 됨)
2. 각 소주제는 탐구 주제와 직접 관련된 구체적인 소제목
3. 논리적 흐름 순서 (개념→분석→적용/결과)
4. 고등학생이 직접 탐구 가능한 수준
5. 소주제마다 탐구 이유 1-2문장 포함

JSON 형식 (subtopics 배열의 원소 수가 반드시 ${subCount}개):
{"subtopics":[{"text":"소주제 제목","reason":"탐구 이유"},{"text":"소주제 제목","reason":"탐구 이유"}]}`);
      if(r?.subtopics&&r.subtopics.length>0){
        // 정확히 subCount 개수로 맞춤
        let arr=[...r.subtopics];
        // 부족하면 채우기
        while(arr.length<subCount) arr.push({text:"소주제 "+(arr.length+1),reason:""});
        // 넘치면 자르기
        arr=arr.slice(0,subCount);
        const newQs=arr.map((s,i)=>({
          text:s.text||"",reason:s.reason||"",
          link:data.questions[i]?.link||"",links:data.questions[i]?.links||[]
        }));
        set(p=>({...p,questions:newQs,subTopicCount:subCount}));
      } else setErr("생성 실패. 다시 시도해주세요.");
    }catch(e){setErr("오류: "+e.message);}
    setLoading(false);
  };

  const searchRefsForQ=async(qIdx)=>{
    const q=data.questions[qIdx];if(!q?.text)return;
    const qs=[...data.questions];qs[qIdx]={...qs[qIdx],linksLoading:true};set(p=>({...p,questions:qs}));
    try{
      const KOREAN_DOMAINS=["riss.kr","dbpia.co.kr","kiss.kstudy","academic.naver","kci.go.kr","ndsl.kr",
        ".go.kr",".re.kr",".ac.kr","naver.com","daum.net","chosun.com","hani.co.kr","yonhapnews",
        "yna.co.kr","khan.co.kr","donga.com","kbs.co.kr","mbc.co.kr","sbs.co.kr","edaily.co.kr",
        "ohmynews.com","pressian.com","sisain.co.kr","mk.co.kr","hankyung.com","etnews.com"];
      const isKo=(url)=>KOREAN_DOMAINS.some(d=>url.includes(d));

      // Google Search grounding 호출 — JSON 요청 없이 자연어로
      const prompt=`다음 탐구 소주제와 관련된 학술 자료, 기사, 보고서를 검색해주세요.

소주제: ${q.text}
탐구 주제: ${data.selectedTopic||""}
분야: ${data.field}

한국어 자료(RISS, DBpia, 네이버 학술, 국내 언론, 정부기관)를 우선으로 찾아주세요.`;

      const {text, sources}=await geminiSearch(prompt);

      let links=[];

      // 1순위: grounding sources — vertexaisearch URL 제외
      const INVALID_URLS=["vertexaisearch.cloud.google.com","grounding-api-redirect","generativelanguage.googleapis.com"];
      const isValidUrl=(url)=>url&&url.startsWith("http")&&!INVALID_URLS.some(d=>url.includes(d));

      if(sources&&sources.length>0){
        const validSources=sources.filter(s=>isValidUrl(s.url));
        const ko=validSources.filter(s=>isKo(s.url||""));
        const en=validSources.filter(s=>!isKo(s.url||""));
        const merged=[...ko.slice(0,3),...en.slice(0,enCount)];
        links=merged.map(s=>({
          url:s.url,
          title:s.title&&s.title!==s.url?s.title:q.text+" 관련 자료"
        }));
      }

      // 2순위: 텍스트에서 실제 URL 추출 (vertexaisearch 제외)
      if(links.length===0&&text){
        const urlRegex=/https?:\/\/[^\s\)\]\}"'<>]+/g;
        const found=(text.match(urlRegex)||[]).filter(u=>isValidUrl(u));
        const koUrls=found.filter(u=>isKo(u));
        const enUrls=found.filter(u=>!isKo(u));
        const merged=[...koUrls.slice(0,3),...enUrls.slice(0,enCount)];
        links=merged.map(url=>({url:url.replace(/[.,;!?]$/,""),title:q.text+" 관련 자료"}));
      }

      // 3순위: 그래도 없으면 검색 URL 생성
      if(links.length===0){
        const kw=encodeURIComponent(q.text+" "+data.field);
        links=[
          {url:`https://www.riss.kr/search/Search.do?searchGubun=ALL&query=${kw}`,title:`[RISS] ${q.text} 관련 학술자료`},
          {url:`https://academic.naver.com/search.naver?query=${kw}`,title:`[네이버학술] ${q.text} 관련 자료`},
        ];
        if(enCount>0) links.push({url:`https://scholar.google.com/scholar?q=${kw}`,title:`[Google Scholar] ${q.text}`});
      }

      const updated=[...data.questions];
      updated[qIdx]={...updated[qIdx],links,link:links[0]?.url||"",linksLoading:false};
      set(p=>({...p,questions:updated}));
    }catch(e){
      console.error("자료검색 오류:",e.message);
      // 오류 시 기본 검색 URL 제공
      const kw=encodeURIComponent((data.questions[qIdx]?.text||"")+" "+(data.field||""));
      const fallbackLinks=[
        {url:`https://www.riss.kr/search/Search.do?searchGubun=ALL&query=${kw}`,title:`[RISS] 관련 학술자료 검색`},
        {url:`https://academic.naver.com/search.naver?query=${kw}`,title:`[네이버학술] 관련 자료 검색`},
      ];
      const updated=[...data.questions];
      updated[qIdx]={...updated[qIdx],links:fallbackLinks,link:fallbackLinks[0]?.url||"",linksLoading:false};
      set(p=>({...p,questions:updated}));
    }
  };

  const updLink=(i,li,field,v)=>{const q=[...data.questions];const links=[...(q[i].links||[])];links[li]={...links[li],[field]:v};q[i]={...q[i],links,link:links[0]?.url||""};set(p=>({...p,questions:q}));};
  const addLink=(i)=>{const q=[...data.questions];q[i]={...q[i],links:[...(q[i].links||[]),{url:"",title:"직접 입력"}]};set(p=>({...p,questions:q}));};
  const rmLink=(i,li)=>{const q=[...data.questions];const links=(q[i].links||[]).filter((_,idx)=>idx!==li);q[i]={...q[i],links,link:links[0]?.url||""};set(p=>({...p,questions:q}));};

  return <div className="fade">
    <PH page={3} title="본론 소주제 구성" sub="탐구 본론의 소주제 수를 선택하고 AI가 추천하는 소주제를 확인·수정하세요."/>
    <div className="info-box">
      📋 선택된 주제: <strong>{data.selectedTopic||"아직 선택 안 됨"}</strong>
      {!data.selectedTopic&&<span style={{color:"var(--warn)",marginLeft:8,fontSize:11}}>← 이전 페이지에서 먼저 주제를 선택하세요</span>}
    </div>

    <div className="sec-label">본론 소주제 수 선택</div>
    <div className="vol-opts" style={{marginBottom:20}}>
      {[2,3,4,5].map(n=>(
        <button key={n} className={`vol-btn ${subCount===n?"sel":""}`} onClick={()=>changeSubCount(n)}>{n}개</button>
      ))}
    </div>

    <div className="btn-row">
      <button className="btn btn-primary" onClick={aiGenSubTopics} disabled={loading||!data.selectedTopic}>{loading?"생성 중...":"🤖 AI 소주제 자동 추천"}</button>

function P7({data,set,onPrev,onNext}){
  const [loading,setLoading]=useState(false);
  const [which,setWhich]=useState(null);
  const sections=[{key:"motivation",label:"탐구의 동기",min:300,max:500,ph:"이 주제를 탐구하게 된 동기를 서술하세요. (300~500자 권장)"},{key:"purpose",label:"탐구의 목적",min:300,max:500,ph:"이 탐구를 통해 달성하려는 목적을 서술하세요. (300~500자 권장)"},{key:"necessity",label:"탐구의 필요성",min:300,max:500,ph:"이 탐구가 왜 필요한지 서술하세요. (300~500자 권장)"}];

        const r=await geminiJSON(`고등학생 탐구보고서 서론 작성. ${base}
동기:300~500자(계기,경험,사회적배경)/목적:300~500자/필요성:300~500자
JSON:{"motivation":"내용","purpose":"내용","necessity":"내용"}`);
        if(r)set(p=>({...p,intro:{...p.intro,...r}}));
      } else {
        const specs={motivation:"탐구의 동기 (300~500자): 개인적 계기, 관련 경험, 사회적 배경",purpose:"탐구의 목적 (300~500자): 구체적 목적과 기대 효과",necessity:"탐구의 필요성 (300~500자): 학문적·사회적 필요성"};
        const r=await geminiJSON(`고등학생 탐구보고서 서론 항목 작성. ${base}\n항목: ${specs[target]}\nJSON:{"content":"내용"}`);

function P8({data,set,onPrev,onNext}){
  const [loading,setLoading]=useState(false);
  const [loadingIdx,setLoadingIdx]=useState(null);
  const [imgModal,setImgModal]=useState(null);
  const [imgUrlInput,setImgUrlInput]=useState("");
  const [imgCaption,setImgCaption]=useState("");
  const fileRef=useRef();

  const getImgs=(i)=>(data.bodyImages?.[`q${i}`]||[]);
  const setImgs=(i,imgs)=>set(p=>({...p,bodyImages:{...p.bodyImages,[`q${i}`]:imgs}}));
  const addImageFromFile=(qIdx,file)=>{
    if(!file||!file.type.startsWith("image/"))return;
    const reader=new FileReader();
    reader.onload=(e)=>{setImgs(qIdx,[...getImgs(qIdx),{id:Date.now(),src:e.target.result,caption:imgCaption||"",srcType:"upload"}]);setImgModal(null);setImgCaption("");setImgUrlInput("");};
    reader.readAsDataURL(file);
  };
  const addImageFromUrl=(qIdx)=>{
    if(!imgUrlInput.trim())return;

function P11({data,set,onPrev,onNext}){
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState("");
  const [corrected,setCorrected]=useState(data.correctedText||null);

  const correctSection=async(text)=>{
    if(!text.trim())return text;
    const r=await gemini(`당신은 국어 전문 교정 편집자입니다. 아래 텍스트의 문법·맞춤법·어색한 표현만 수정해 주세요.
규칙: 원문 내용·분량·문장수를 반드시 유지. 설명·안내문 절대 추가 금지. 교정된 텍스트만 출력.

${text}`);
    return r.replace(/^(교정본|교정\s*결과|다음은|아래는|네,|알겠습니다)[^\n]*\n/i,"").trim();
  };

  const correct=async()=>{
    setLoading(true);setProgress("준비 중...");setCorrected(null);
    try{
      const sections=[
        {label:"[서론-동기]",text:data.intro?.motivation||""},
        {label:"[서론-목적]",text:data.intro?.purpose||""},
        {label:"[서론-필요성]",text:data.intro?.necessity||""},
        ...(data.questions||[]).map((q,i)=>({label:`[본론${i+1}-${q.text}]`,text:data.body?.[`q${i}`]||""})),
        {label:"[결론-요약]",text:data.conclusion?.summary||""},
        {label:"[결론-알게된점]",text:data.conclusion?.learned||""},
        {label:"[결론-역량]",text:data.conclusion?.skills||""},
        {label:"[결론-추가목표]",text:data.conclusion?.future||""},
      ];
      const total=sections.filter(s=>s.text.trim()).length;
      let done=0;const results=[];
      for(const s of sections){
        if(s.text.trim()){done++;setProgress(`(${done}/${total}) ${s.label.replace(/[\[\]]/g,"")} 교정 중...`);
          const fixed=await correctSection(s.text);results.push(s.label+"\n"+fixed);
        }else results.push(s.label+"\n"+s.text);
      }
      const final=results.join("\n\n");setCorrected(final);set(p=>({...p,correctedText:final}));setProgress("");
    }catch(e){alert("오류: "+e.message);setProgress("");}
    setLoading(false);
  };

  const renderCorrected=(text)=>{
    if(!text)return null;
    const blocks=[];const parts=text.split(/(\[[^\]]+\])/);let currentLabel=null;
    for(const p of parts){if(/^\[[^\]]+\]$/.test(p)){currentLabel=p.replace(/^\[|\]$/g,"");blocks.push({label:currentLabel,body:""});}else if(blocks.length>0)blocks[blocks.length-1].body+=p;}
    return blocks.map((b,i)=>(
      <div key={i} style={{marginBottom:20}}>
        <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--accent)",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8,paddingBottom:5,borderBottom:"1px solid var(--border2)"}}>{b.label}</div>
        <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.9,whiteSpace:"pre-wrap",margin:0}}>{b.body.trim()}</p>
      </div>
    ));
  };

  return <div className="fade">
    <PH page={11} title="AI 문법 교정본" sub="섹션별 순차 교정 — 전체 내용이 잘리지 않습니다."/>
    <div className="btn-row">
      <button className="btn btn-primary" onClick={correct} disabled={loading}>{loading?"교정 중...":"✨ AI 문법 교정 실행"}</button>
      {corrected&&<button className="btn btn-success" onClick={()=>dlPDF(data,makeFilename(data,"교정본")+".html",false,true)}>📄 교정본 PDF</button>}
      {corrected&&<button className="btn btn-secondary" onClick={()=>downloadDoc(data,makeFilename(data,"교정본")+".doc",false,true)}>📝 교정본 DOC</button>}
      {corrected&&<button className="btn btn-warn" onClick={correct} disabled={loading}>🔄 다시 교정</button>}
    </div>
    {loading&&<AILoad msg="섹션별 순차 교정 중 — 전체 내용이 보존됩니다." sub={progress}/>}
    {corrected&&<div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:"22px 24px"}}>{renderCorrected(corrected)}</div>}
    {!corrected&&!loading&&<div className="card" style={{textAlign:"center",padding:40,color:"var(--text3)"}}>위 버튼을 눌러 AI 문법 교정을 시작하세요<br/><span style={{fontSize:11,marginTop:6,display:"block"}}>섹션마다 개별 교정하므로 내용이 잘리지 않습니다.</span></div>}
    <NavRow page={10} onPrev={onPrev} onNext={onNext} nextLabel="자기평가서 →"/>
  </div>;
}

  const ev=data.selfEval||{};const cr=data.correctedEval||{};
  const fields=[{key:"motivation",label:"동기",ph:"이 탐구를 시작하게 된 동기 (150자 내외)"},{key:"process",label:"과정",ph:"탐구 과정에서 경험한 것들 (180자 내외)"},{key:"skills",label:"강화된 역량",ph:"탐구를 통해 강화된 역량 (120자 내외)"},{key:"learned",label:"새롭게 알게 된 점",ph:"새롭게 알게 된 점 (150자 내외)"},{key:"future",label:"추후 탐구",ph:"앞으로 더 탐구하고 싶은 내용 (100자 내외)"}];

  const dlCombinedPDF=()=>dlPDF(data,makeFilename(data,"자기평가서포함")+".html",true,false);
  const dlCombinedDoc=()=>downloadDoc(data,makeFilename(data,"자기평가서포함")+".doc",true,false);

    {fields.map(f=>(
      <div key={f.key} className="eval-item">
        <div className="eval-lbl">{f.label}</div>
        <textarea rows={3} placeholder={f.ph} value={ev[f.key]||""} onChange={e=>set(p=>({...p,selfEval:{...p.selfEval,[f.key]:e.target.value}}))}/>
        <button className="btn btn-ghost" style={{marginTop:7,fontSize:11}} onClick={()=>correctOne(f.key,ev[f.key]||"",f.label)} disabled={!(ev[f.key]||"").trim()}>✨ AI 교정</button>
        {cr[f.key]&&<div style={{marginTop:10}}><div className="sec-label">AI 교정 결과</div><div className="ai-out" style={{minHeight:50}}>{cr[f.key]}</div></div>}
      </div>

    <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:"16px",marginTop:8}}>
      <div className="sec-label" style={{marginBottom:8}}>📄 저장 옵션</div>
      <div className="btn-row" style={{marginBottom:4}}>
        <button className="btn btn-success" onClick={dlCombinedPDF}>📄 통합 PDF (보고서+자기평가서)</button>
        <button className="btn btn-secondary" onClick={dlCombinedDoc}>📝 통합 DOC (보고서+자기평가서)</button>
      </div>
      <div style={{fontSize:11,color:"var(--text3)"}}>* AI 교정 결과가 있는 항목은 교정본으로 저장됩니다.</div>
    </div>
    <div className="nav-row">
      <button className="btn btn-secondary" onClick={onPrev}>← 이전</button>
      <button className="btn btn-primary" onClick={onNext}>말투 변환 →</button>

  </div>;
}
