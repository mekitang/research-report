  </div>;
}

// ─── P13: 말투 변환 & 최종 출력 ──────────────────────────────────────────
function P13({data,set,onPrev,onFinish}){
  const [style,setStyle]=useState("");
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState("");
  const [converted,setConverted]=useState(data.styledReport||null);

  const STYLES=[
    {key:"natural",  label:"자연스러운 학생 글체",  desc:"AI가 쓴 것 같지 않은 자연스러운 고등학생 문체"},
    {key:"formal",   label:"고1 수준",               desc:"고등학교 1학년 수준의 어휘와 문장"},
    {key:"middle",   label:"중학생 수준",             desc:"중학생이 이해할 수 있는 쉬운 단어와 문장"},
    {key:"simple",   label:"어려운 단어 최소화",      desc:"전문용어를 줄이고 쉽게 풀어서 표현"},
    {key:"informal", label:"반말체",                  desc:"친근한 반말 형식으로 작성 (발표용)"},
    {key:"academic", label:"논문체",                  desc:"격식 있는 학술 논문 스타일의 문어체"},
  ];

  const buildFullText=(d)=>{
    const sections=[
      {label:"[서론-동기]",    text:d.intro?.motivation||""},
      {label:"[서론-목적]",    text:d.intro?.purpose||""},
      {label:"[서론-필요성]",  text:d.intro?.necessity||""},
      ...(d.questions||[]).map((q,i)=>({label:`[본론${i+1}-${q.text}]`,text:d.body?.["q"+i]||""})),
      {label:"[결론-요약]",    text:d.conclusion?.summary||""},
      {label:"[결론-알게된점]",text:d.conclusion?.learned||""},
      {label:"[결론-역량]",    text:d.conclusion?.skills||""},
      {label:"[결론-추가목표]",text:d.conclusion?.future||""},
    ];
    return sections;
  };

  const convert=async()=>{
    if(!style){alert("말투 스타일을 선택하세요.");return;}
    setLoading(true);setProgress("");setConverted(null);
    const styleDesc={
      natural:"AI가 작성한 것 같지 않고 고등학생이 직접 쓴 것처럼 자연스럽게. 너무 매끄럽지 않고 약간의 개성이 느껴지도록.",
      formal:"고등학교 1학년 수준. 적절한 어휘, 명확한 문장 구조.",
      middle:"중학생도 이해할 수 있는 수준. 어려운 단어를 쉽게 풀어서.",
      simple:"전문 용어와 어려운 단어를 최대한 줄이고 일상적인 표현으로.",
      informal:"반말체로 자연스럽게. '~했어', '~이야', '~하더라' 형식.",
      academic:"학술 논문체. '~하였다', '~됨을 알 수 있다', '~에 따르면' 등 격식체.",
    };

    try{
      const sections=buildFullText(data).filter(s=>s.text.trim());
      const total=sections.length;
      const results=[];

      for(let i=0;i<sections.length;i++){
        const s=sections[i];
        setProgress(`(${i+1}/${total}) ${s.label.replace(/[\[\]]/g,"")} 변환 중...`);
        if(i>0) await sleep(2000); // 연속 호출 간 2초 딜레이
        const r=await gemini(`다음 텍스트를 아래 말투 스타일로 변환해주세요.

스타일: ${styleDesc[style]}

규칙:
1. 내용과 사실은 절대 변경하지 말 것
2. 분량을 줄이거나 문장을 삭제하지 말 것
3. 변환된 텍스트만 출력 (설명 추가 금지)

원문:
${s.text}`);
        const clean=r.replace(/^(변환본|변환 결과|다음은|아래는|네,|알겠습니다)[^\n]*\n/i,"").trim();
        results.push({label:s.label, text:clean});
      }

      const final=results.map(r=>r.label+"\n"+r.text).join("\n\n");
      setConverted(final);
      set(p=>({...p,styledReport:final,styledReportStyle:style}));
      setProgress("");
    }catch(e){alert("오류: "+e.message);setProgress("");}
    setLoading(false);
  };

  // 변환본을 구조화하여 렌더링
  const renderConverted=(text)=>{
    if(!text)return null;
    const blocks=[];
    const parts=text.split(/(\[[^\]]+\])/);
    let cur=null;
    for(const p of parts){
      if(/^\[[^\]]+\]$/.test(p)){cur=p.replace(/^\[|\]$/g,"");blocks.push({label:cur,body:""});}
      else if(blocks.length>0)blocks[blocks.length-1].body+=p;
    }
    return blocks.map((b,i)=>(
      <div key={i} style={{marginBottom:20}}>
        <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--accent)",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8,paddingBottom:5,borderBottom:"1px solid var(--border2)"}}>{b.label}</div>
        <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.9,whiteSpace:"pre-wrap",margin:0}}>{b.body.trim()}</p>
      </div>
    ));
  };

  // 변환본 데이터로 download용 data 객체 구성
  const buildConvertedData=()=>{
    if(!converted)return data;
    const d=JSON.parse(JSON.stringify(data));
    const blocks=[];
    const parts=converted.split(/(\[[^\]]+\])/);
    let cur=null;
    for(const p of parts){
      if(/^\[[^\]]+\]$/.test(p)){cur=p.replace(/^\[|\]$/g,"");blocks.push({label:cur,body:""});}
      else if(blocks.length>0)blocks[blocks.length-1].body+=p;
    }
    blocks.forEach(b=>{
      const lbl=b.label;const txt=b.body.trim();
      if(lbl==="서론-동기")d.intro.motivation=txt;
      else if(lbl==="서론-목적")d.intro.purpose=txt;
      else if(lbl==="서론-필요성")d.intro.necessity=txt;
      else if(lbl.startsWith("결론-요약"))d.conclusion.summary=txt;
      else if(lbl.startsWith("결론-알게된점"))d.conclusion.learned=txt;
      else if(lbl.startsWith("결론-역량"))d.conclusion.skills=txt;
      else if(lbl.startsWith("결론-추가목표"))d.conclusion.future=txt;
      else{
        const m=lbl.match(/본론(\d+)/);
        if(m)d.body["q"+(parseInt(m[1])-1)]=txt;
      }
    });
    return d;
  };

  const dlConvertedPDF=()=>{
    const d=buildConvertedData();
    const esc=(s)=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const styleName=STYLES.find(s=>s.key===style)?.label||"변환본";
    const refsHTML=buildRefsHTML(d);
    const body=`<h1 style="text-align:center;font-size:22px;margin-bottom:4px">${esc(d.selectedTopic)}</h1>
<p style="text-align:center;color:#555;font-size:13px;margin-bottom:8px">${esc(d.school)} ${esc(d.grade)} ${esc(d.name)}</p>
<p style="text-align:center;color:#888;font-size:12px;margin-bottom:36px">[말투: ${styleName}]</p>
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">Ⅰ. 서론</h2>
<h3 style="font-size:14px;color:#333;margin-top:18px">1.1 탐구의 동기</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(d.intro?.motivation||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">1.2 탐구의 목적</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(d.intro?.purpose||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">1.3 탐구의 필요성</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(d.intro?.necessity||"")}</p>
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">Ⅱ. 본론</h2>
${(d.questions||[]).map((q,i)=>`<h3 style="font-size:14px;color:#333;margin-top:18px">${i+1}. ${esc(q.text)}</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(d.body?.["q"+i]||"")}</p>`).join("")}
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">Ⅲ. 결론</h2>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.1 탐구 요약</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(d.conclusion?.summary||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.2 알게 된 점</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(d.conclusion?.learned||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.3 향상된 역량</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(d.conclusion?.skills||"")}</p>
<h3 style="font-size:14px;color:#333;margin-top:18px">3.4 추가 탐구 목표</h3><p style="white-space:pre-wrap;line-height:1.9">${esc(d.conclusion?.future||"")}</p>
<h2 style="font-size:17px;border-bottom:2px solid #222;padding-bottom:6px;margin-top:30px">참고문헌</h2>${refsHTML}`;
    // PDF: 인쇄 창 없이 직접 인쇄 가능한 HTML 생성
    const style_css=`@page{size:A4;margin:2.5cm}body{font-family:'맑은 고딕','Noto Sans KR',Arial,sans-serif;font-size:14px;line-height:1.9;color:#111}h1,h2,h3{font-family:'맑은 고딕','Noto Sans KR',Arial,sans-serif}p{margin-bottom:10px}`;
    const full=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(d.selectedTopic)}_${styleName}</title><style>${style_css}@media screen{body{padding:2cm;max-width:21cm;margin:0 auto}}</style></head><body>${body}<script>(function(){var done=false;function t(){if(done)return;done=true;window.print();}window.addEventListener("load",function(){setTimeout(t,400);})})()<\/script></body></html>`;
    const blob=new Blob(["\ufeff"+full],{type:"text/html;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=makeFilename(d,styleName)+".html";a.click();
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  };

  const dlConvertedDoc=()=>{
    const d=buildConvertedData();
    const styleName=STYLES.find(s=>s.key===style)?.label||"변환본";
    downloadDoc(d,makeFilename(d,styleName)+".doc");
  };

  return <div className="fade">
    <PH page={13} title="말투 변환 & 최종 출력" sub="전체 보고서의 말투를 AI로 변환하고 최종 다운로드합니다."/>
    <div className="info-box">주제: <strong>{data.selectedTopic}</strong></div>

    <div className="sec-label">말투 스타일 선택</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      {STYLES.map(s=>(
        <div key={s.key} onClick={()=>setStyle(s.key)}
          style={{background:"var(--surface)",border:`2px solid ${style===s.key?"var(--accent)":"var(--border)"}`,
            borderRadius:"var(--r2)",padding:"14px 16px",cursor:"pointer",transition:"all .18s"}}>
          <div style={{fontSize:13,fontWeight:600,color:style===s.key?"var(--accent)":"var(--text)",marginBottom:4}}>{s.label}</div>
          <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>{s.desc}</div>
        </div>
      ))}
    </div>

    <div className="btn-row">
      <button className="btn btn-primary" onClick={convert} disabled={loading||!style}>
        {loading?"변환 중...":"✨ AI 말투 변환"}
      </button>
      {converted&&<button className="btn btn-warn" onClick={convert} disabled={loading}>🔄 다시 변환</button>}
    </div>

    {loading&&<AILoad msg="전체 보고서를 변환 중입니다..." sub={progress}/>}

    {converted&&<>
      <div className="sec-label" style={{marginTop:16}}>변환된 보고서 — {STYLES.find(s=>s.key===style)?.label}</div>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:"22px 24px",marginBottom:16}}>
        {renderConverted(converted)}
      </div>
      <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:"16px",marginBottom:20}}>
        <div className="sec-label" style={{marginBottom:10}}>📄 변환본 저장</div>
        <div className="btn-row" style={{marginBottom:4}}>
          <button className="btn btn-success" onClick={dlConvertedPDF}>📄 PDF 저장</button>
          <button className="btn btn-secondary" onClick={dlConvertedDoc}>📝 DOC 다운로드</button>
        </div>
      </div>
    </>}

    <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:"16px"}}>
      <div className="sec-label" style={{marginBottom:10}}>📄 원본 저장</div>
      <div className="btn-row" style={{marginBottom:4}}>
        <button className="btn btn-success" onClick={()=>dlPDF(data,makeFilename(data)+".html")}>📄 원본 PDF</button>
        <button className="btn btn-secondary" onClick={()=>downloadDoc(data,makeFilename(data)+".doc")}>📝 원본 DOC</button>
        <button className="btn btn-success" onClick={()=>dlPDF(data,makeFilename(data,"자기평가서포함")+".html",true)}>📄 통합 PDF</button>
        <button className="btn btn-secondary" onClick={()=>downloadDoc(data,makeFilename(data,"자기평가서포함")+".doc",true)}>📝 통합 DOC</button>
      </div>
    </div>

    <div className="nav-row">
      <button className="btn btn-secondary" onClick={onPrev}>← 이전</button>
      <button className="btn btn-success" onClick={()=>{if(onFinish)onFinish();else alert("🎉 탐구보고서가 완성되었습니다!");}}>✅ 완료 & 홈으로</button>
    </div>
  </div>;
}



// ─── Report App (보고서 작성 메인) ───────────────────────────────────────
function ReportApp({user,onLogout,onCoinUpdate,initData,initReportId,onGoHome}){
  const [page,setPage]=useState(0);
  const [showSave,setShowSave]=useState(false);
  const [showReports,setShowReports]=useState(false);
  const [reportId,setReportId]=useState(initReportId||null);
  const [data,setData]=useState(()=>
    initData?{...initData}:{...JSON.parse(JSON.stringify(INIT)),school:user.school||"",grade:user.grade||"",name:user.name||""}
  );

  // toc 동기화
  useEffect(()=>{
    const items=data.questions.map((q,i)=>q.text?`${i+1}. ${q.text}`:`${i+1}번째 탐구 질문`);
    setData(p=>({...p,toc:{...p.toc,body:{items}}}));
  },[data.questions.length,data.questions.map(q=>q.text).join("|")]);

  // 자동저장
  const autoSave=async(currentData,currentReportId)=>{
    if(!currentReportId) return;
    try{
      await waitFb();
      const {doc,setDoc,serverTimestamp}=window._fbFns;
      const title=`${currentData.school||""} ${currentData.grade||""} ${currentData.name||""} — ${currentData.selectedTopic||"작성 중"}`;
      await setDoc(doc(window._fbDb,"reports",currentReportId),{
        userId:user.uid,userName:user.name||"",
        title,data:JSON.parse(JSON.stringify(currentData)),
        updatedAt:serverTimestamp(),reportId:currentReportId
      },{merge:true});
    }catch(e){console.warn("자동저장 실패:",e.message);}
  };

  const go=(n)=>{
    setPage(n);window.scrollTo(0,0);
    if(reportId) autoSave(data,reportId);
  };

  const handleLoad=(d,id)=>{setData(d);setReportId(id||null);setShowSave(false);setShowReports(false);go(0);};

  const pages=[
    <Page1 data={data} set={setData} user={user} onNext={()=>go(1)}/>,
    <Page2 data={data} set={setData} onPrev={()=>go(0)} onNext={()=>go(2)}/>,
    <Page4 data={data} set={setData} onPrev={()=>go(1)} onNext={()=>go(3)}/>,
    <Page3 data={data} set={setData} onPrev={()=>go(2)} onNext={()=>go(4)}/>,
    <Page5 data={data} set={setData} onPrev={()=>go(3)} onNext={()=>go(5)}/>,
    <Page6 data={data} set={setData} onPrev={()=>go(4)} onNext={()=>go(6)}/>,
    <Page7 data={data} set={setData} onPrev={()=>go(5)} onNext={()=>go(7)}/>,
    <Page8 data={data} set={setData} onPrev={()=>go(6)} onNext={()=>go(8)}/>,
    <Page9 data={data} set={setData} onPrev={()=>go(7)} onNext={()=>go(9)}/>,
    <Page10 data={data} set={setData} onPrev={()=>go(8)} onNext={()=>go(10)}/>,
    <Page11 data={data} set={setData} onPrev={()=>go(9)} onNext={()=>go(11)}/>,
    <Page12 data={data} set={setData} onPrev={()=>go(10)} onNext={()=>go(12)}/>,
    <P13 data={data} set={setData} onPrev={()=>go(11)} onFinish={onGoHome}/>,
  ];

  const PAGES_NAMES=["기본정보","관심분야","주제추천","소주제구성","목차","작성방식","서론","본론","결론","전체보기","교정본","자기평가서","말투변환"];

  return <div className="shell">
    <div className="topbar">
      <div className="logo">STUDY<span>.</span>AI</div>
      <div className="prog-track">
        {PAGES_NAMES.map((name,i)=>(
          <div key={i} className={`prog-dot ${i===page?"active":i<page?"done":""}`}
            onClick={()=>{ if(page>=4&&i<4){alert("소주제 구성 이전 페이지로는 돌아갈 수 없습니다.");return;} go(i); }} title={name}
            style={{cursor:page>=4&&i<4?"not-allowed":"pointer",opacity:page>=4&&i<4?0.4:1}}/>
        ))}
      </div>
      <div className="topbar-right">
        <div className="page-name">{PAGES_NAMES[page]}</div>
        <div className="coin-badge">🪙 {user.coins||0}</div>
        {reportId&&<div style={{fontSize:10,fontFamily:"var(--mono)",color:"var(--success)",padding:"3px 8px",border:"1px solid var(--success)",borderRadius:4}}>자동저장 ON</div>}
        <button className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>setShowSave(true)}>💾 저장</button>
        <button className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>setShowReports(true)}>📋 내 보고서</button>
        {onGoHome&&<button className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>{
          if(window.confirm("홈으로 이동하시겠습니까?\n\n✅ 지금까지 작성된 내용은 자동 저장됩니다.\n❌ 사용된 코인은 환불되지 않습니다."))onGoHome();
        }}>🏠 홈</button>}
        <button className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>{
          if(window.confirm("로그아웃하시겠습니까?\n\n✅ 지금까지 작성된 내용은 자동 저장됩니다.\n❌ 사용된 코인은 환불되지 않습니다."))onLogout();
        }}>로그아웃</button>
      </div>
    </div>
    <div className="page-wrap">{pages[page]}</div>
    {showSave&&<SaveModal data={data} user={user} reportId={reportId}
      onReportIdSet={(id)=>setReportId(id)}
      onClose={()=>setShowSave(false)}
      onLoad={handleLoad}/>}
    {showReports&&<MyReportsModal user={user} onClose={()=>setShowReports(false)} onLoad={handleLoad}/>}
  </div>;
}

// ─── Login Screen ─────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [tab,setTab]=useState("login");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [pw2,setPw2]=useState("");
  const [name,setName]=useState("");
  const [school,setSchool]=useState("");
  const [grade,setGrade]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [msg,setMsg]=useState("");

  const errMsg=(c)=>({
    "auth/user-not-found":"등록되지 않은 계정입니다.",
    "auth/wrong-password":"비밀번호가 올바르지 않습니다.",
    "auth/invalid-email":"이메일 형식이 올바르지 않습니다.",
    "auth/invalid-credential":"이메일 또는 비밀번호가 올바르지 않습니다.",
    "auth/too-many-requests":"잠시 후 다시 시도해주세요.",
    "auth/email-already-in-use":"이미 사용 중인 이메일입니다.",
    "auth/weak-password":"비밀번호는 6자 이상이어야 합니다.",
  }[c]||"오류가 발생했습니다. 다시 시도해주세요.");

  const doLogin=async()=>{
    if(!email||!pw){setErr("이메일과 비밀번호를 입력하세요.");return;}
    setLoading(true);setErr("");
    try{
      await waitFb();
      const {signInWithEmailAndPassword,doc,getDoc}=window._fbFns;
      const cred=await signInWithEmailAndPassword(window._fbAuth,email,pw);
      const snap=await getDoc(doc(window._fbDb,"users",cred.user.uid));
      if(!snap.exists()){setErr("사용자 정보를 찾을 수 없습니다.");setLoading(false);return;}
      onLogin({uid:cred.user.uid,...snap.data()});
    }catch(e){setErr(errMsg(e.code));}
    setLoading(false);
  };

  const doSignup=async()=>{
    if(!email||!pw||!pw2||!name||!school||!grade){setErr("모든 항목을 입력하세요.");return;}
    if(pw!==pw2){setErr("비밀번호가 일치하지 않습니다.");return;}
    if(pw.length<6){setErr("비밀번호는 6자 이상이어야 합니다.");return;}
    setLoading(true);setErr("");
    try{
      await waitFb();
      const {createUserWithEmailAndPassword,doc,setDoc,serverTimestamp}=window._fbFns;
      const cred=await createUserWithEmailAndPassword(window._fbAuth,email,pw);
      await setDoc(doc(window._fbDb,"users",cred.user.uid),{
        email,name,school,grade,
        coins:1,
        role:"student",
        createdAt:serverTimestamp()
      });
      setMsg("✅ 회원가입 완료! 코인 1개가 지급되었습니다.");
      setTab("login");
      setEmail("");setPw("");setPw2("");setName("");setSchool("");setGrade("");
    }catch(e){setErr(errMsg(e.code));}
    setLoading(false);
  };

  return <div className="login-wrap">
    <div className="login-box fade">
      <div className="login-logo">STUDY<span>.</span>AI</div>
      <div className="login-title">탐구보고서 AI 시스템</div>

      <div style={{display:"flex",gap:0,marginBottom:20,borderRadius:"var(--r)",overflow:"hidden",border:"1px solid var(--border)"}}>
        {[["login","로그인"],["signup","회원가입"]].map(([key,label])=>(
          <button key={key} onClick={()=>{setTab(key);setErr("");setMsg("");}}
            style={{flex:1,padding:"9px",fontSize:13,fontWeight:tab===key?700:400,
              background:tab===key?"var(--accent)":"var(--surface2)",
              color:tab===key?"#fff":"var(--text3)",border:"none",cursor:"pointer"}}>
            {label}
          </button>
        ))}
      </div>

      {err&&<div className="err-box" style={{marginBottom:12}}>{err}</div>}
      {msg&&<div className="info-box" style={{marginBottom:12}}>{msg}</div>}

      {tab==="login"&&<>
        <div className="fg"><label>이메일</label>
          <input type="email" placeholder="student@school.kr" value={email}
            onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        </div>
        <div className="fg"><label>비밀번호</label>
          <input type="password" placeholder="••••••••" value={pw}
            onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        </div>
        <button className="btn btn-primary" style={{width:"100%",marginTop:8,padding:"12px"}}
          onClick={doLogin} disabled={loading}>
          {loading?"로그인 중...":"로그인"}
        </button>
        <div style={{textAlign:"center",marginTop:12,fontSize:12,color:"var(--text3)"}}>
          계정이 없으신가요?{" "}
          <span style={{color:"var(--accent)",cursor:"pointer",textDecoration:"underline"}}
            onClick={()=>{setTab("signup");setErr("");}}>회원가입</span>
        </div>
      </>}

      {tab==="signup"&&<>
        <div className="info-box" style={{fontSize:11,marginBottom:12}}>
          🎁 신규 회원가입 시 <strong>코인 1개</strong>가 즉시 지급됩니다!
        </div>
        <div className="fr2">
          <div className="fg"><label>이름 *</label>
            <input type="text" placeholder="홍길동" value={name} onChange={e=>setName(e.target.value)}/>
          </div>
          <div className="fg"><label>학교명 *</label>
            <input type="text" placeholder="○○고등학교" value={school} onChange={e=>setSchool(e.target.value)}/>
          </div>
        </div>
        <div className="fg"><label>학년 *</label>
          <div style={{display:"flex",gap:8}}>
            {["1학년","2학년","3학년"].map(g=>(
              <button key={g} onClick={()=>setGrade(g)}
                className={"btn "+(grade===g?"btn-primary":"btn-ghost")}
                style={{flex:1,fontSize:13}}>{g}</button>
            ))}
          </div>
        </div>
        <div className="fg"><label>이메일 *</label>
          <input type="email" placeholder="student@school.kr" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        <div className="fg"><label>비밀번호 * (6자 이상)</label>
          <input type="password" placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)}/>
        </div>
        <div className="fg"><label>비밀번호 확인 *</label>
          <input type="password" placeholder="••••••••" value={pw2} onChange={e=>setPw2(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&doSignup()}/>
        </div>
        <button className="btn btn-primary" style={{width:"100%",padding:"12px"}}
          onClick={doSignup} disabled={loading}>
          {loading?"처리 중...":"🎁 회원가입 (코인 1개 지급)"}
        </button>
        <div style={{textAlign:"center",marginTop:12,fontSize:12,color:"var(--text3)"}}>
          이미 계정이 있으신가요?{" "}
          <span style={{color:"var(--accent)",cursor:"pointer",textDecoration:"underline"}}
            onClick={()=>{setTab("login");setErr("");}}>로그인</span>
        </div>
      </>}

      <div style={{marginTop:24,paddingTop:16,borderTop:"1px solid var(--border)",
        textAlign:"center",fontSize:11,color:"var(--text3)"}}>
        <div>문의 · 코인 지급 요청</div>
        <div style={{fontSize:13,fontWeight:600,color:"var(--text2)",marginTop:4,letterSpacing:"1px"}}>
          📞 010-8107-5210
        </div>
      </div>
    </div>
  </div>;
}


function App(){
  const [user,setUser]=useState(null);
  const [checking,setChecking]=useState(true);
  const [screen,setScreen]=useState("home");
  const [newReportId,setNewReportId]=useState(null);
  const [loadData,setLoadData]=useState(null);
  const [loadReportId,setLoadReportId]=useState(null);

  useEffect(()=>{
    waitFb().then(()=>{
      const {onAuthStateChanged,doc,getDoc}=window._fbFns;
      onAuthStateChanged(window._fbAuth,async(fbUser)=>{
        if(fbUser){
          try{
            const snap=await getDoc(doc(window._fbDb,"users",fbUser.uid));
            if(snap.exists()){
              setUser({uid:fbUser.uid,...snap.data()});
            }else{
              setUser(false);
            }
          }catch(e){
            console.error("Auth error:",e.message);
            setUser(false);
          }
        }else{
          setUser(false);
        }
        setChecking(false);
      });
    }).catch((e)=>{
      console.error("Firebase init error:",e);
      setUser(false);
      setChecking(false);
    });
  },[]);

  const handleLogin=(userData)=>{
    setChecking(false);
    setUser({coins:0,role:"student",name:"",school:"",grade:"",...userData});
    setScreen("home");
  };

  const handleLogout=async()=>{
    try{
      await waitFb();
      const {signOut}=window._fbFns;
      await signOut(window._fbAuth);
    }catch(e){console.warn("logout error:",e.message);}
    setUser(false);setScreen("home");
    setNewReportId(null);setLoadData(null);setLoadReportId(null);
  };

  const handleCoinConfirm=async()=>{
    try{
      await waitFb();
      const {doc,updateDoc,increment}=window._fbFns;
      const id=user.uid+"_"+Date.now();
      await updateDoc(doc(window._fbDb,"users",user.uid),{coins:increment(-1)});
      setUser(p=>({...p,coins:(p.coins||1)-1}));
      setNewReportId(id);
      setLoadData(null);setLoadReportId(null);
      setScreen("writing");
    }catch(e){alert("코인 차감 오류: "+e.message);}
  };

  const handleLoadReport=(d,id)=>{
    setLoadData(d);setLoadReportId(id);
    setNewReportId(null);
    setScreen("writing");
  };

  if(checking){
    return <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",zIndex:9998}}>
      <div className="ai-load"><div className="pulse"/><span>서비스에 연결 중...</span></div>
    </div>;
  }

  if(!user) return <LoginScreen onLogin={handleLogin}/>;
  if(user.role==="admin") return <AdminScreen user={user} onLogout={handleLogout}/>;

  if(screen==="writing"){
    return <ReportApp
      user={user} onLogout={handleLogout}
      onCoinUpdate={(c)=>setUser(p=>({...p,coins:c}))}
      initData={loadData}
      initReportId={loadReportId||newReportId}
      onGoHome={()=>{
        if(window.confirm("홈으로 이동하시겠습니까?\n\n✅ 지금까지 작성된 내용은 자동 저장됩니다.\n❌ 사용된 코인은 환불되지 않습니다.")){
          setScreen("home");setNewReportId(null);setLoadData(null);setLoadReportId(null);
        }
      }}
    />;
  }

  return <ReportHomeScreen
    user={user}
    onLogout={handleLogout}
    onNewReport={()=>setScreen("show_coin")}
    onLoadReport={handleLoadReport}
    showCoin={screen==="show_coin"}
    onCoinConfirm={handleCoinConfirm}
    onCoinCancel={()=>setScreen("home")}
    onUserUpdate={(u)=>setUser(u)}
  />;
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(<App/>);
setTimeout(function(){
  var fb = document.getElementById('loading-fallback');
  if(fb) fb.style.display = 'none';
}, 200);
</script>
</body>
</html>
